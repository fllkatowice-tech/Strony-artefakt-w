<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kurhan Mongolski</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #000;
    width: 100vw; height: 100vh;
    overflow: hidden;
    font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
    cursor: crosshair;
  }
  canvas { display:block; position:fixed; inset:0; }

  #overlay {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  /* Vignette */
  #vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, transparent 38%, rgba(0,0,0,0.72) 100%);
    pointer-events: none; z-index: 8;
  }

  /* Film grain */
  #grain {
    position: fixed; inset: 0;
    opacity: 0.045;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px;
    animation: grainShift 0.12s steps(1) infinite;
    pointer-events: none; z-index: 9;
  }
  @keyframes grainShift {
    0%  { transform: translate(0,0); }
    25% { transform: translate(-3px,2px); }
    50% { transform: translate(2px,-1px); }
    75% { transform: translate(-1px,3px); }
  }

  #title {
    position: fixed; top: 28px; left: 50%;
    transform: translateX(-50%);
    color: #c89040;
    font-size: clamp(11px,1.0vw,14px);
    letter-spacing: 8px; text-transform: uppercase;
    text-shadow: 0 0 40px #c8904099, 0 0 80px #a06020 55;
    white-space: nowrap; opacity: 0;
    animation: fadeIn 3s ease 1.5s forwards;
    pointer-events: none; z-index: 12;
  }
  #subtitle {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%);
    color: #6a4818;
    font-size: clamp(7px,0.65vw,9px);
    letter-spacing: 5px; text-transform: uppercase;
    white-space: nowrap; opacity: 0;
    animation: fadeIn 2s ease 4s forwards;
    pointer-events: none; z-index: 12;
  }
  #hint {
    position: fixed; bottom: 52px; left: 50%;
    transform: translateX(-50%);
    color: #4a3010;
    font-size: clamp(7px,0.6vw,8px);
    letter-spacing: 4px; text-transform: uppercase;
    white-space: nowrap; opacity: 0;
    animation: fadeIn 2s ease 5s forwards, fadeOut 2s ease 9s forwards;
    pointer-events: none; z-index: 12;
  }

  /* Torch flicker overlay */
  #torch-overlay {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 110%, rgba(255,140,20,0.08) 0%, transparent 55%);
    pointer-events: none; z-index: 7;
    animation: torchFlicker 0.18s ease infinite alternate;
  }
  @keyframes torchFlicker {
    from { opacity: 0.6; }
    to   { opacity: 1.0; }
  }

  @keyframes fadeIn  { to { opacity: 1; } }
  @keyframes fadeOut { to { opacity: 0; } }
</style>
</head>
<body>
<div id="grain"></div>
<div id="vignette"></div>
<div id="torch-overlay"></div>
<div id="title">⊕ &nbsp; K U R H A N &nbsp; M O N G O L S K I &nbsp; ⊕</div>
<div id="subtitle">WNĘTRZE GROBOWCA · XIII WIEK · STEP ŚRODKOWOAZJATYCKI</div>
<div id="hint">PRZECIĄGNIJ ABY ROZEJRZEĆ SIĘ DOOKOŁA</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ══════════════════════════════════════════════════════════════════════
// RENDERER
// ══════════════════════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled   = true;
renderer.shadowMap.type      = THREE.PCFSoftShadowMap;
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020101);
scene.fog = new THREE.FogExp2(0x040202, 0.055);

// ── Camera – first person viewpoint ──────────────────────────────────
const camera = new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.01, 80);
camera.position.set(0, 1.6, 0.5);
camera.lookAt(0, 1.4, -3);

// ══════════════════════════════════════════════════════════════════════
// TEXTURES
// ══════════════════════════════════════════════════════════════════════
function makeEarthTex(w=512) {
  const c=document.createElement('canvas'); c.width=c.height=w;
  const ctx=c.getContext('2d');
  const g=ctx.createLinearGradient(0,0,w,w);
  g.addColorStop(0,'#2e1e0e'); g.addColorStop(0.5,'#1a100a'); g.addColorStop(1,'#120c06');
  ctx.fillStyle=g; ctx.fillRect(0,0,w,w);
  for (let i=0;i<900;i++) {
    ctx.beginPath(); ctx.arc(Math.random()*w,Math.random()*w,0.5+Math.random()*3.5,0,Math.PI*2);
    ctx.fillStyle=`rgba(${50+Math.random()*40},${35+Math.random()*25},${15+Math.random()*15},${0.15+Math.random()*0.30})`; ctx.fill();
  }
  for (let i=0;i<40;i++) {
    ctx.beginPath(); ctx.moveTo(Math.random()*w,Math.random()*w);
    ctx.lineTo(Math.random()*w,Math.random()*w);
    ctx.strokeStyle=`rgba(60,40,18,${0.06+Math.random()*0.10})`; ctx.lineWidth=0.5+Math.random()*2; ctx.stroke();
  }
  return new THREE.CanvasTexture(c);
}

function makeRockTex() {
  const c=document.createElement('canvas'); c.width=c.height=512;
  const ctx=c.getContext('2d');
  const g=ctx.createRadialGradient(256,256,10,256,256,280);
  g.addColorStop(0,'#4a3e30'); g.addColorStop(0.5,'#2e2418'); g.addColorStop(1,'#1a1008');
  ctx.fillStyle=g; ctx.fillRect(0,0,512,512);
  for (let i=0;i<600;i++) {
    ctx.beginPath(); ctx.arc(Math.random()*512,Math.random()*512,0.8+Math.random()*4,0,Math.PI*2);
    ctx.fillStyle=`rgba(${65+Math.random()*45},${50+Math.random()*30},${30+Math.random()*20},${0.18+Math.random()*0.25})`; ctx.fill();
  }
  return new THREE.CanvasTexture(c);
}

function makeWoodTex() {
  const c=document.createElement('canvas'); c.width=512; c.height=128;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#3a2010'; ctx.fillRect(0,0,512,128);
  for (let i=0;i<20;i++) {
    const y=i*7+Math.random()*4;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.bezierCurveTo(128,y+Math.random()*3,384,y-Math.random()*3,512,y);
    ctx.strokeStyle=`rgba(${80+Math.random()*40},${50+Math.random()*25},${18+Math.random()*12},${0.35+Math.random()*0.4})`; ctx.lineWidth=1+Math.random()*1.5; ctx.stroke();
  }
  return new THREE.CanvasTexture(c);
}

function makeMetalTex() {
  const c=document.createElement('canvas'); c.width=c.height=256;
  const ctx=c.getContext('2d');
  const g=ctx.createLinearGradient(0,0,256,0);
  g.addColorStop(0,'#404848'); g.addColorStop(0.4,'#707878'); g.addColorStop(0.6,'#909898'); g.addColorStop(1,'#505858');
  ctx.fillStyle=g; ctx.fillRect(0,0,256,256);
  for (let i=0;i<200;i++) {
    ctx.beginPath(); ctx.moveTo(0,Math.random()*256); ctx.lineTo(256,Math.random()*256);
    ctx.strokeStyle=`rgba(100,120,120,${0.04+Math.random()*0.10})`; ctx.lineWidth=0.3+Math.random(); ctx.stroke();
  }
  return new THREE.CanvasTexture(c);
}

function makeGoldTex() {
  const c=document.createElement('canvas'); c.width=c.height=256;
  const ctx=c.getContext('2d');
  const g=ctx.createRadialGradient(80,70,5,128,128,160);
  g.addColorStop(0,'#ffe880'); g.addColorStop(0.3,'#e8b820'); g.addColorStop(0.7,'#b08008'); g.addColorStop(1,'#604800');
  ctx.fillStyle=g; ctx.fillRect(0,0,256,256);
  for (let i=0;i<120;i++) {
    ctx.beginPath(); ctx.arc(Math.random()*256,Math.random()*256,0.5+Math.random()*2,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,240,100,${0.06+Math.random()*0.18})`; ctx.fill();
  }
  return new THREE.CanvasTexture(c);
}

function makeFabricTex() {
  const c=document.createElement('canvas'); c.width=c.height=256;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#6a1008'; ctx.fillRect(0,0,256,256);
  for (let i=0;i<256;i+=4) {
    ctx.fillStyle=i%8===0?'rgba(0,0,0,0.15)':'rgba(255,255,255,0.04)';
    ctx.fillRect(0,i,256,2);
  }
  for (let j=0;j<256;j+=4) {
    ctx.fillStyle=j%8===0?'rgba(0,0,0,0.12)':'rgba(255,255,255,0.03)';
    ctx.fillRect(j,0,2,256);
  }
  return new THREE.CanvasTexture(c);
}

const TEX = {
  earth: makeEarthTex(1024),
  rock:  makeRockTex(),
  wood:  makeWoodTex(),
  metal: makeMetalTex(),
  gold:  makeGoldTex(),
  fabric:makeFabricTex(),
};
TEX.earth.wrapS = TEX.earth.wrapT = THREE.RepeatWrapping; TEX.earth.repeat.set(4,4);
TEX.rock.wrapS  = TEX.rock.wrapT  = THREE.RepeatWrapping; TEX.rock.repeat.set(3,3);
TEX.wood.wrapS  = TEX.wood.wrapT  = THREE.RepeatWrapping; TEX.wood.repeat.set(4,1);

// ══════════════════════════════════════════════════════════════════════
// MATERIALS
// ══════════════════════════════════════════════════════════════════════
const MAT = {
  earth:  new THREE.MeshStandardMaterial({ map:TEX.earth, color:0x1e1208, roughness:0.98, metalness:0 }),
  rock:   new THREE.MeshStandardMaterial({ map:TEX.rock,  color:0x2a1e10, roughness:0.95, metalness:0 }),
  wood:   new THREE.MeshStandardMaterial({ map:TEX.wood,  color:0x3a2010, roughness:0.88, metalness:0 }),
  metal:  new THREE.MeshStandardMaterial({ map:TEX.metal, color:0x505858, roughness:0.35, metalness:0.90, emissive:0x080c0c, emissiveIntensity:0.05 }),
  rust:   new THREE.MeshStandardMaterial({ map:TEX.metal, color:0x5a3820, roughness:0.75, metalness:0.55 }),
  gold:   new THREE.MeshStandardMaterial({ map:TEX.gold,  color:0xe0a010, roughness:0.12, metalness:1.0, emissive:0x604800, emissiveIntensity:0.25 }),
  goldDk: new THREE.MeshStandardMaterial({ map:TEX.gold,  color:0x906808, roughness:0.22, metalness:0.95, emissive:0x301e00, emissiveIntensity:0.15 }),
  fabric: new THREE.MeshStandardMaterial({ map:TEX.fabric,color:0x7a1008, roughness:0.92, metalness:0 }),
  bone:   new THREE.MeshStandardMaterial({ color:0xc8b890, roughness:0.85, metalness:0 }),
  torch:  new THREE.MeshStandardMaterial({ color:0xff8010, roughness:1, metalness:0, emissive:0xff6000, emissiveIntensity:2.0, transparent:true, opacity:0.9 }),
  flame:  new THREE.MeshStandardMaterial({ color:0xff4000, roughness:1, metalness:0, emissive:0xff6010, emissiveIntensity:3.0, transparent:true, opacity:0.75, side:THREE.DoubleSide }),
  leather:new THREE.MeshStandardMaterial({ color:0x3a2810, roughness:0.90, metalness:0 }),
  horn:   new THREE.MeshStandardMaterial({ color:0x2a1808, roughness:0.82, metalness:0, emissive:0x180c04, emissiveIntensity:0.05 }),
  bronze: new THREE.MeshStandardMaterial({ color:0x8a5c20, roughness:0.30, metalness:0.88, emissive:0x3a2008, emissiveIntensity:0.20 }),
  darkwood:new THREE.MeshStandardMaterial({ color:0x1e1008, roughness:0.90, metalness:0 }),
  string: new THREE.MeshStandardMaterial({ color:0xd4b880, roughness:0.80, metalness:0 }),
};

// ══════════════════════════════════════════════════════════════════════
// LIGHTS
// ══════════════════════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x100806, 0.4));

// Central torch fires
const torchLights = [];
const torchPositions = [
  new THREE.Vector3(-2.8, 2.2,  -2.0),
  new THREE.Vector3( 2.8, 2.2,  -2.0),
  new THREE.Vector3( 0.0, 2.2,  -5.5),
  new THREE.Vector3(-2.8, 2.2,  -5.0),
  new THREE.Vector3( 2.8, 2.2,  -5.0),
];
torchPositions.forEach(pos => {
  const l = new THREE.PointLight(0xff7010, 22, 7, 2);
  l.position.copy(pos);
  l.castShadow = false;
  scene.add(l);
  torchLights.push(l);
});

// Central burial glow (gold items reflecting)
const centerGlow = new THREE.PointLight(0xe8a010, 12, 5, 2);
centerGlow.position.set(0, 0.5, -4);
scene.add(centerGlow);

// ══════════════════════════════════════════════════════════════════════
// GEOMETRY HELPERS
// ══════════════════════════════════════════════════════════════════════
function mk(geo, mat, {x=0,y=0,z=0,rx=0,ry=0,rz=0}={}) {
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x,y,z); m.rotation.set(rx,ry,rz);
  m.castShadow = true; m.receiveShadow = true;
  return m;
}
function lathe(pts, mat, segs=32, opts={}) {
  return mk(new THREE.LatheGeometry(pts.map(([x,y])=>new THREE.Vector2(x,y)), segs), mat, opts);
}
function cyl(rt,rb,h,seg,mat,opts={}) { return mk(new THREE.CylinderGeometry(rt,rb,h,seg), mat, opts); }
function sph(r,seg,mat,opts={})       { return mk(new THREE.SphereGeometry(r,seg,Math.ceil(seg*0.6)), mat, opts); }
function tor(R,r,ns,nt,mat,opts={})   { return mk(new THREE.TorusGeometry(R,r,ns,nt), mat, opts); }
function box(w,h,d,mat,opts={})       { return mk(new THREE.BoxGeometry(w,h,d), mat, opts); }

function tubeCurve(pts3, radius, seg, radSeg, mat) {
  const m = new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts3),seg,radius,radSeg,false), mat);
  m.castShadow=true; return m;
}

// ══════════════════════════════════════════════════════════════════════
// KURHAN CHAMBER – earthen dome with stone lining
// ══════════════════════════════════════════════════════════════════════
function buildChamber() {
  const g = new THREE.Group();

  // Dome ceiling – inverted hemisphere
  const domeMat = new THREE.MeshStandardMaterial({ map:TEX.earth, color:0x100a04, roughness:0.99, metalness:0, side:THREE.BackSide });
  const dome = new THREE.Mesh(new THREE.SphereGeometry(9, 32, 20, 0, Math.PI*2, 0, Math.PI/2), domeMat);
  dome.position.set(0, 0, -3);
  dome.receiveShadow = true;
  g.add(dome);

  // Floor
  const floorMat = new THREE.MeshStandardMaterial({ map:TEX.earth, color:0x180e06, roughness:0.99, metalness:0 });
  floorMat.map.repeat.set(6,6);
  const floor = new THREE.Mesh(new THREE.CircleGeometry(8.5, 32), floorMat);
  floor.rotation.x = -Math.PI/2;
  floor.position.set(0,0,-3);
  floor.receiveShadow = true;
  g.add(floor);

  // Stone ring lining around base of walls
  for (let i=0;i<20;i++) {
    const a=i/20*Math.PI*2;
    const R=8.2;
    const stone = box(0.7+Math.random()*0.5, 0.6+Math.random()*0.4, 0.35, MAT.rock, {
      x:Math.cos(a)*R, y:0.25, z:Math.sin(a)*R-3,
      ry: a + Math.random()*0.2,
    });
    g.add(stone);
  }
  // second stone course
  for (let i=0;i<18;i++) {
    const a=(i+0.5)/18*Math.PI*2;
    const R=7.9;
    g.add(box(0.6+Math.random()*0.4, 0.5+Math.random()*0.3, 0.35, MAT.rock, {
      x:Math.cos(a)*R, y:0.75, z:Math.sin(a)*R-3,
      ry:a+0.1+Math.random()*0.2,
    }));
  }

  // Wooden support beams crossing the ceiling
  const beamAngles = [0, Math.PI/3, 2*Math.PI/3];
  beamAngles.forEach(a => {
    g.add(box(0.18, 0.14, 12, MAT.wood, { y:3.8, z:-3, ry:a, rx:0.08 }));
    g.add(box(0.18, 0.14, 8,  MAT.wood, { y:5.5, z:-3, ry:a+Math.PI/6 }));
  });

  // Entry passage (back of camera)
  g.add(box(2, 2, 3, new THREE.MeshStandardMaterial({ color:0x000000, side:THREE.BackSide }), { y:1, z:3.5 }));

  return g;
}

// ══════════════════════════════════════════════════════════════════════
// TORCHES on walls
// ══════════════════════════════════════════════════════════════════════
function buildTorches() {
  const g = new THREE.Group();
  torchPositions.forEach(pos => {
    // bracket
    g.add(box(0.08, 0.08, 0.28, MAT.metal, { x:pos.x, y:pos.y-0.08, z:pos.z }));
    // handle
    g.add(cyl(0.04, 0.04, 0.45, 8, MAT.wood, { x:pos.x, y:pos.y-0.10, z:pos.z }));
    // head
    g.add(cyl(0.09, 0.07, 0.18, 8, MAT.leather, { x:pos.x, y:pos.y+0.10, z:pos.z }));
    // flame (2 crossed planes)
    const fl1 = mk(new THREE.PlaneGeometry(0.22, 0.38), MAT.flame, { x:pos.x, y:pos.y+0.34, z:pos.z });
    const fl2 = fl1.clone(); fl2.rotation.y=Math.PI/2;
    fl1.name='flame'; fl2.name='flame';
    g.add(fl1,fl2);
    // emissive glow sphere
    g.add(sph(0.06,6,MAT.torch, { x:pos.x, y:pos.y+0.22, z:pos.z }));
  });
  return g;
}

// ══════════════════════════════════════════════════════════════════════
// CENTRAL BURIAL – wooden frame coffin with fabric draping
// ══════════════════════════════════════════════════════════════════════
function buildBurial() {
  const g = new THREE.Group();
  const cx=0, cz=-4.5;

  // Wooden coffin frame
  g.add(box(1.8, 0.14, 4.0, MAT.wood,    { x:cx, y:0.07, z:cz }));
  g.add(box(0.14,0.55, 4.0, MAT.darkwood,{ x:cx-0.87, y:0.34, z:cz }));
  g.add(box(0.14,0.55, 4.0, MAT.darkwood,{ x:cx+0.87, y:0.34, z:cz }));
  g.add(box(1.8, 0.14, 0.14,MAT.wood,    { x:cx, y:0.34, z:cz-1.93 }));
  g.add(box(1.8, 0.14, 0.14,MAT.wood,    { x:cx, y:0.34, z:cz+1.93 }));

  // Red fabric draping inside
  g.add(box(1.55, 0.06, 3.72, MAT.fabric, { x:cx, y:0.14, z:cz }));

  // Pillow at head
  g.add(box(0.55, 0.14, 0.40, new THREE.MeshStandardMaterial({ color:0x8a1808, roughness:0.90 }), { x:cx, y:0.17, z:cz+1.60 }));

  return g;
}

// ══════════════════════════════════════════════════════════════════════
// WEAPONS
// ══════════════════════════════════════════════════════════════════════
function buildWeapons() {
  const g = new THREE.Group();

  // ── Composite bow (leaning against wall, left) ─────────────────────
  {
    const bx=-3.5, bz=-3.8;
    const pts = [];
    for (let i=0;i<=20;i++) {
      const t=i/20*Math.PI;
      pts.push(new THREE.Vector3(Math.sin(t)*0.55, bx+Math.cos(t)*0.55, bz));
    }
    // Not a curve — let's use a curved tube
    const bowCurve = [];
    for (let i=0;i<=20;i++) {
      const t=i/20;
      const a=(t-0.5)*Math.PI*0.9;
      bowCurve.push(new THREE.Vector3(
        Math.sin(a)*0.55 + bx,
        Math.cos(a)*0.80,
        bz
      ));
    }
    g.add(tubeCurve(bowCurve, 0.035, 20, 8, MAT.horn));

    // string
    g.add(tubeCurve([
      new THREE.Vector3(bowCurve[0].x,bowCurve[0].y,bz+0.01),
      new THREE.Vector3(bowCurve[10].x+0.08,bowCurve[10].y,bz+0.01),
      new THREE.Vector3(bowCurve[20].x,bowCurve[20].y,bz+0.01),
    ], 0.008, 10, 4, MAT.string));

    // bow tips
    g.add(sph(0.045, 6, MAT.horn, { x:bowCurve[0].x, y:bowCurve[0].y, z:bz }));
    g.add(sph(0.045, 6, MAT.horn, { x:bowCurve[20].x,y:bowCurve[20].y,z:bz }));
  }

  // ── Quiver with arrows (right wall) ───────────────────────────────
  {
    const qx=3.8, qz=-3.5;
    // quiver body
    g.add(lathe([
      [0.00,0],[0.14,0],[0.16,0.18],[0.17,0.90],[0.16,1.60],[0.14,1.80],
      [0.12,1.90],[0.15,2.00],[0.17,2.10],[0.15,2.20],[0.12,2.20],
    ], MAT.leather, 16, { x:qx, y:0.0, z:qz, rx:-0.2 }));
    // decorative band
    g.add(tor(0.17, 0.025, 6, 16, MAT.gold, { x:qx, y:1.50, z:qz, rx:Math.PI/2-0.2 }));

    // arrows sticking out
    for (let i=0;i<7;i++) {
      const ax=qx+Math.sin(i*1.1)*0.07, az=qz+Math.cos(i*1.1)*0.07;
      // shaft
      g.add(cyl(0.010,0.010, 1.10, 6, MAT.wood, { x:ax, y:1.80, z:az }));
      // arrowhead
      g.add(lathe([[0,0],[0.025,0.04],[0.010,0.14],[0,0.16]], MAT.metal, 8, { x:ax, y:2.38, z:az }));
      // fletching
      for (let f=0;f<3;f++) {
        const fa=f/3*Math.PI*2;
        g.add(mk(new THREE.PlaneGeometry(0.06,0.18), MAT.fabric, { x:ax+Math.cos(fa)*0.02, y:1.40, z:az+Math.sin(fa)*0.02, ry:fa }));
      }
    }
  }

  // ── Sword/saber (lying on ground near coffin) ──────────────────────
  {
    const sx=-1.2, sz=-3.2, sy=0.04;
    // blade – slightly curved
    const bladePts = [];
    for (let i=0;i<=16;i++) {
      const t=i/16;
      bladePts.push(new THREE.Vector3(sx+t*1.85, sy+0.01, sz-Math.sin(t*0.4)*0.12));
    }
    g.add(tubeCurve(bladePts, 0.022, 16, 5, MAT.metal));
    // fuller (ridge along blade)
    const ridgePts=bladePts.map(p=>new THREE.Vector3(p.x,p.y+0.012,p.z));
    g.add(tubeCurve(ridgePts, 0.008, 16, 4, MAT.metal));
    // crossguard
    g.add(box(0.06,0.08,0.60, MAT.goldDk, { x:sx, y:sy+0.02, z:sz }));
    // handle
    g.add(cyl(0.030,0.025,0.35, 8, MAT.leather, { x:sx-0.175, y:sy+0.02, z:sz, rz:Math.PI/2 }));
    // pommel
    g.add(sph(0.065,8, MAT.gold, { x:sx-0.35, y:sy+0.02, z:sz }));
    // scabbard (beside blade)
    const scabbardPts=bladePts.map(p=>new THREE.Vector3(p.x,p.y-0.04,p.z+0.18));
    g.add(tubeCurve(scabbardPts, 0.030, 16, 8, MAT.leather));
    g.add(tor(0.035,0.015,6,10,MAT.gold,{x:sx+0.30,y:sy-0.04,z:sz+0.18,rx:Math.PI/2}));
    g.add(tor(0.035,0.015,6,10,MAT.gold,{x:sx+1.40,y:sy-0.04,z:sz+0.18,rx:Math.PI/2}));
  }

  // ── Spear (leaning against wall) ──────────────────────────────────
  {
    const spx=3.2, spz=-5.5, spy=0;
    g.add(cyl(0.025,0.022, 2.6, 8, MAT.wood,  { x:spx, y:1.3, z:spz, rx:0.15, rz:0.12 }));
    // spearhead
    g.add(lathe([[0,0],[0.04,0.06],[0.06,0.18],[0.04,0.40],[0,0.45]], MAT.metal, 8,
      { x:spx+0.21, y:2.62, z:spz-0.06, rx:0.15, rz:Math.PI/2-0.12 }));
    // binding
    g.add(tor(0.036, 0.014, 6, 12, MAT.gold, { x:spx+0.20, y:2.50, z:spz-0.04, rx:Math.PI/2 }));
    // butt ferrule
    g.add(cyl(0.032,0.028,0.10,8, MAT.metal, { x:spx-0.22, y:0.05, z:spz+0.04, rx:0.15, rz:0.12 }));
  }

  // ── Mace (on ground) ──────────────────────────────────────────────
  {
    const mx=1.5, mz=-3.0, my=0.04;
    g.add(cyl(0.030,0.025,0.70, 8, MAT.wood, { x:mx, y:my+0.35, z:mz, rz:Math.PI/3 }));
    // flanged head
    for (let f=0;f<6;f++) {
      const fa=f/6*Math.PI*2;
      g.add(mk(new THREE.BoxGeometry(0.06,0.22,0.04), MAT.bronze, {
        x:mx+0.52+Math.cos(fa)*0.10,
        y:my+0.70+0.30+Math.sin(fa)*0.10,
        z:mz,
        rx:fa, ry:Math.PI/3,
      }));
    }
    g.add(sph(0.12,10,MAT.bronze,{x:mx+0.52,y:my+0.70+0.30,z:mz}));
    g.add(sph(0.055,8,MAT.gold,  {x:mx+0.52,y:my+0.70+0.30,z:mz}));
  }

  return g;
}

// HELMETS (2 – on wooden stands)
// ══════════════════════════════════════════════════════════════════════
function buildHelmets() {
  const g = new THREE.Group();

  // ── Helmet 1 – conical lamellar helmet (left side) ─────────────────
  {
    const hx=-2.5, hz=-5.5, hy=0.88;
    // wooden stand pole
    g.add(cyl(0.04,0.04,0.88,8, MAT.wood, { x:hx, y:0.44, z:hz }));
    g.add(box(0.50,0.06,0.50, MAT.wood,   { x:hx, y:0.04, z:hz }));

    // helmet dome – conical
    g.add(lathe([
      [0.00,hy+0.00],[0.06,hy+0.02],[0.18,hy+0.06],[0.34,hy+0.14],
      [0.48,hy+0.26],[0.56,hy+0.42],[0.58,hy+0.60],[0.54,hy+0.80],
      [0.44,hy+1.00],[0.28,hy+1.16],[0.10,hy+1.24],[0.00,hy+1.26],
    ], MAT.metal, 24, { x:hx, y:0, z:hz }));

    // lamellar bands (horizontal strips)
    for (let b=0;b<6;b++) {
      const by=hy+0.12+b*0.18, br=0.56-b*0.08;
      g.add(tor(br,0.022,6,24,MAT.rust,{x:hx,y:by,z:hz,rx:Math.PI/2}));
    }

    // top spike
    g.add(lathe([[0,hy+1.24],[0.04,hy+1.26],[0.03,hy+1.40],[0,hy+1.50]], MAT.gold, 8, { x:hx, y:0, z:hz }));

    // nasal bar (nose guard)
    g.add(box(0.025,0.20,0.040, MAT.metal, { x:hx, y:hy+0.50, z:hz+0.56 }));

    // cheek guards (aventail)
    for (const side of [-1,1]) {
      g.add(lathe([
        [0.0,0],[0.06,0.0],[0.22,0.10],[0.28,0.28],[0.22,0.44],[0.10,0.52],[0,0.52],
      ], MAT.rust, 8, { x:hx+side*0.40, y:hy+0.16, z:hz, ry:side*0.6, rx:-0.05 }));
    }
  }

  // ── Helmet 2 – rounded helmet with mail aventail (right side) ──────
  {
    const hx=2.5, hz=-5.5, hy=0.88;
    g.add(cyl(0.04,0.04,0.88,8, MAT.wood, { x:hx, y:0.44, z:hz }));
    g.add(box(0.50,0.06,0.50, MAT.wood,   { x:hx, y:0.04, z:hz }));

    // rounded dome
    g.add(lathe([
      [0.00,hy+0.00],[0.08,hy+0.02],[0.24,hy+0.10],[0.42,hy+0.24],
      [0.54,hy+0.44],[0.58,hy+0.68],[0.52,hy+0.92],[0.40,hy+1.10],
      [0.22,hy+1.20],[0.08,hy+1.24],[0.00,hy+1.25],
    ], MAT.metal, 24, { x:hx, y:0, z:hz }));

    // decorative border
    g.add(tor(0.58,0.025,8,32,MAT.gold,{x:hx,y:hy+0.44,z:hz,rx:Math.PI/2}));
    // top knob
    g.add(sph(0.06,8,MAT.gold,{x:hx,y:hy+1.28,z:hz}));

    // mail aventail (rings hanging from brim)
    for (let i=0;i<22;i++) {
      const a=i/22*Math.PI*2;
      const r=0.58, drop=0.06+Math.sin(i*1.3+0.5)*0.06;
      for (let d=0;d<3;d++) {
        g.add(tor(0.04,0.012,5,8,MAT.metal,{
          x:hx+Math.cos(a)*r,
          y:hy+0.40-d*0.085-drop,
          z:hz+Math.sin(a)*r,
          rx:Math.PI/2,
        }));
      }
    }

    // nasal piece
    g.add(box(0.030,0.22,0.038, MAT.gold, { x:hx, y:hy+0.48, z:hz+0.56 }));
    // brow decoration
    for (let i=0;i<8;i++) {
      const a=i/8*Math.PI;
      g.add(sph(0.028,5,MAT.gold,{x:hx+Math.cos(a)*0.57,y:hy+0.46,z:hz+Math.sin(a)*0.57}));
    }
  }

  return g;
}

// INSTRUMENTS (morin khuur + khomus + drums)

    // body – trapezoid resonance box

    g.add(box(0.03,0.12,0.025, new THREE.MeshStandardMaterial({color:0x050302}), { x:mx-0.08, y:my+0.22, z:mz+0.056 }));
    g.add(box(0.03,0.12,0.025, new THREE.MeshStandardMaterial({color:0x050302}), { x:mx+0.08, y:my+0.22, z:mz+0.056 }));
    // waist

    g.add(box(0.06,0.22,0.05, MAT.darkwood, { x:mx, y:my+1.66, z:mz }));

    for (const dx of [-0.012,0.012]) {
      g.add(tubeCurve([

        new THREE.Vector3(mx+dx,my+1.64,mz+0.025),

    // bridge
    g.add(box(0.06,0.04,0.015,MAT.bone,{x:mx,y:my+0.28,z:mz+0.056}));

    const bowPts=[];
    for (let i=0;i<=12;i++){const t=i/12;bowPts.push(new THREE.Vector3(mx+0.22,my+0.05+t*1.20,mz+Math.sin(t*0.6)*0.06));}
    g.add(tubeCurve(bowPts,0.006,12,5,MAT.wood));
    g.add(tubeCurve([new THREE.Vector3(mx+0.22,my+0.05,mz),new THREE.Vector3(mx+0.22+0.04,my+0.62,mz-0.04),new THREE.Vector3(mx+0.22,my+1.25,mz)],0.003,10,4,MAT.string));
  }

  // ── Khomus / Jew's harp (on a cloth on ground) ────────────────────
  {
    const kx=1.0, kz=-3.8, ky=0.04;
    // frame – U-shape
    g.add(tubeCurve([
      new THREE.Vector3(kx-0.05, ky, kz),
      new THREE.Vector3(kx-0.06, ky+0.06, kz),
      new THREE.Vector3(kx-0.07, ky+0.14, kz),
      new THREE.Vector3(kx-0.05, ky+0.22, kz),
      new THREE.Vector3(kx+0.05, ky+0.22, kz),
      new THREE.Vector3(kx+0.07, ky+0.14, kz),
      new THREE.Vector3(kx+0.06, ky+0.06, kz),
      new THREE.Vector3(kx+0.05, ky, kz),
    ], 0.012, 14, 6, MAT.bronze));
    // reed tongue
    g.add(tubeCurve([
      new THREE.Vector3(kx,ky+0.02,kz),
      new THREE.Vector3(kx,ky+0.12,kz+0.01),
      new THREE.Vector3(kx,ky+0.20,kz),

    g.add(box(0.30,0.005,0.20,MAT.fabric,{x:kx,y:ky-0.01,z:kz}));

  // ── Frame drum / shaman drum (on ground, leaning) ─────────────────
  {

      g.add(sph(0.022,5,MAT.bone,{
        x:dx+Math.cos(a)*0.54,
        y:dy+0.55+Math.sin(a)*0.54*Math.cos(0.3)+0.01,

    g.add(cyl(0.018,0.015,0.50,6,MAT.wood,{x:dx+0.70,y:dy+0.12,z:dz-0.10,rz:Math.PI/3}));

  // ── Small bells / idiophones (hanging from coffin edge) ───────────

    for (let i=0;i<5;i++) {

      g.add(sph(0.018,5,MAT.metal,{x:bx,y:by+0.10,z:bz}));

      g.add(tubeCurve([new THREE.Vector3(bx,by+0.26,bz),new THREE.Vector3(bx,by+0.38,bz)],0.004,4,4,MAT.string));
    }
  }

  return g;
}

  // ── Ornate gold cup ───────────────────────────────────────────────

// CAMERA ORBIT CONTROL (drag to look around)
// ══════════════════════════════════════════════════════════════════════
let isPointerDown = false;
let lastX=0, lastY=0;
let yaw=Math.PI, pitch=-0.08;
const pitchMin=-0.55, pitchMax=0.55;

function updateCamera() {
  const dir = new THREE.Vector3(
    Math.sin(yaw)*Math.cos(pitch),
    Math.sin(pitch),
    Math.cos(yaw)*Math.cos(pitch)
  );
  camera.lookAt(camera.position.clone().add(dir));
}
updateCamera();

renderer.domElement.addEventListener('pointerdown', e => {
  isPointerDown=true; lastX=e.clientX; lastY=e.clientY;
});
window.addEventListener('pointerup',   () => isPointerDown=false);
window.addEventListener('pointermove', e => {
  if (!isPointerDown) return;
  const dx=e.clientX-lastX, dy=e.clientY-lastY;
  yaw   -= dx*0.004;
  pitch -= dy*0.004;
  pitch  = Math.max(pitchMin, Math.min(pitchMax, pitch));
  lastX=e.clientX; lastY=e.clientY;
  updateCamera();
});

// Touch support
renderer.domElement.addEventListener('touchstart', e=>{
  isPointerDown=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
},{passive:true});
window.addEventListener('touchend',()=>isPointerDown=false);
window.addEventListener('touchmove',e=>{
  if(!isPointerDown)return;
  const dx=e.touches[0].clientX-lastX, dy=e.touches[0].clientY-lastY;
  yaw-=dx*0.004; pitch-=dy*0.004;
  pitch=Math.max(pitchMin,Math.min(pitchMax,pitch));
  lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  updateCamera();
},{passive:true});

// Auto slow pan when idle
let idleTimer=0;
const IDLE_DELAY=4.0;

// ══════════════════════════════════════════════════════════════════════
// RENDER LOOP
// ══════════════════════════════════════════════════════════════════════
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  const t=clock.elapsedTime;

  // Torch flicker
  torchLights.forEach((l,i) => {
    l.intensity = 20+Math.sin(t*7.1+i*1.3)*5+Math.sin(t*13.7+i*0.9)*2.5;
    l.color.setHSL(0.07+Math.sin(t*3+i)*0.015, 1.0, 0.52);
  });
  centerGlow.intensity = 10+Math.sin(t*2.3)*2;

  // Animate flames
  scene.traverse(c => {
    if (c.name==='flame') {
      c.material.opacity=0.60+Math.sin(t*8.4+c.position.x)*0.22;
      const s=0.85+Math.sin(t*11.2+c.position.z)*0.18;
      c.scale.set(s,0.9+Math.sin(t*6.3)*0.15,s);
    }
  });

  // Idle auto-pan
  if (!isPointerDown) {
    idleTimer += dt;
    if (idleTimer > IDLE_DELAY) {
      yaw += dt * 0.04;
      updateCamera();
    }
  } else {
    idleTimer = 0;
  }

  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
