// WAX TEXTURE — front face with uploaded seal image
// luminance → red-brown wax relief
// ══════════════════════════════════════════════════════
function buildSealTex(img, w, h) {
  var cx=w/2, cy=h/2, R=w/2-6;

  // Step 1: draw rotated image on offscreen canvas
  var tmp=document.createElement("canvas"); tmp.width=w; tmp.height=h;
  var tctx=tmp.getContext("2d");
  tctx.fillStyle="#000"; tctx.fillRect(0,0,w,h);
  tctx.save();
  tctx.beginPath(); tctx.arc(cx,cy,R,0,Math.PI*2); tctx.clip();
  tctx.translate(cx,cy);
  var iw=img.naturalWidth||img.width, ih=img.naturalHeight||img.height;
  var scale=Math.max((R*2)/iw,(R*2)/ih)*1.02;
  tctx.drawImage(img,-iw*scale/2,-ih*scale/2,iw*scale,ih*scale);
  tctx.restore();
  var pd=tctx.getImageData(0,0,w,h);

  // Step 2: map luminance → wax relief palette
  var c=document.createElement("canvas"); c.width=w; c.height=h;
  var ctx=c.getContext("2d");

  // Deep crimson wax base radial gradient
  var bg=ctx.createRadialGradient(cx-R*0.18,cy-R*0.22,4,cx,cy,R*1.08);
  bg.addColorStop(0,"#c03018");
  bg.addColorStop(0.2,"#a02010");
  bg.addColorStop(0.5,"#7a1208");
  bg.addColorStop(0.8,"#580a04");
  bg.addColorStop(1,"#300400");
  ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);

  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();

  // Luminance → wax palette with S-curve contrast
  var out=ctx.createImageData(w,h);
  var od=out.data;
  for(var i=0;i<pd.data.length;i+=4){
    var px=(i/4)%w, py=Math.floor((i/4)/w);
    var dist=Math.sqrt((px-cx)*(px-cx)+(py-cy)*(py-cy));
    if(dist>R){od[i+3]=0;continue;}
    var lum=(pd.data[i]*0.299+pd.data[i+1]*0.587+pd.data[i+2]*0.114)/255;
    // S-curve: push apart shadows and highlights for crisp relief
    lum=lum<0.5?2*lum*lum:1-Math.pow(-2*lum+2,2)/2;
    // Wax palette: recessed=dark red-brown, raised=pale amber-cream
    od[i]  =Math.round(80 +lum*175); // R: 80→255
    od[i+1]=Math.round(18 +lum*120); // G: 18→138
    od[i+2]=Math.round(4  +lum*50);  // B: 4→54
    od[i+3]=255;
  }
  ctx.putImageData(out,0,0);

  // Directional relief highlight — upper-left light
  ctx.globalCompositeOperation="overlay";
  var hl=ctx.createLinearGradient(cx-R*0.7,cy-R*0.7,cx+R*0.5,cy+R*0.5);
  hl.addColorStop(0,"rgba(255,200,140,0.42)");
  hl.addColorStop(0.35,"rgba(200,100,60,0.15)");
  hl.addColorStop(0.65,"rgba(40,5,0,0.18)");
  hl.addColorStop(1,"rgba(20,0,0,0.40)");
  ctx.fillStyle=hl; ctx.fillRect(0,0,w,h);
  ctx.globalCompositeOperation="source-over";

  // Wax surface: poured-flow noise patches
  for(var n=0;n<200;n++){
    var nx=Math.random()*w, ny=Math.random()*h, nr=4+Math.random()*18;
    var ng=ctx.createRadialGradient(nx,ny,0,nx,ny,nr);
    var b=Math.random()>0.5;
    ng.addColorStop(0,b?"rgba(200,80,40,0.10)":"rgba(10,0,0,0.14)");
    ng.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle=ng; ctx.fillRect(0,0,w,h);
  }

  // Concentric wax flow marks
  for(var rr=14;rr<R-2;rr+=4){
    ctx.beginPath(); ctx.arc(cx,cy,rr,0,Math.PI*2);
    ctx.strokeStyle="rgba(180,60,20,"+(0.015+Math.abs(Math.sin(rr*0.4))*0.015)+")";
    ctx.lineWidth=0.4; ctx.stroke();
  }

  // Edge vignette
  var vig=ctx.createRadialGradient(cx,cy,R*0.4,cx,cy,R);
  vig.addColorStop(0,"rgba(0,0,0,0)");
  vig.addColorStop(0.65,"rgba(15,2,0,0.15)");
  vig.addColorStop(1,"rgba(40,5,0,0.65)");
  ctx.fillStyle=vig; ctx.fillRect(0,0,w,h);

  ctx.restore();

  // Raised rim — 3 rings like talar
  ctx.beginPath(); ctx.arc(cx,cy,R+1,0,Math.PI*2);
  ctx.strokeStyle="#140200"; ctx.lineWidth=5; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle="#8a1808"; ctx.lineWidth=9; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,R+0.5,0,Math.PI*2);
  ctx.strokeStyle="#d04020"; ctx.lineWidth=3; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,R-5,0,Math.PI*2);
  ctx.strokeStyle="rgba(30,4,0,0.70)"; ctx.lineWidth=2.5; ctx.stroke();

  return new THREE.CanvasTexture(c);
}

// ══════════════════════════════════════════════════════
// BACK FACE — plain wax (no image, just texture)
// ══════════════════════════════════════════════════════
function makeWaxBackTex(w, h) {
  var cx=w/2, cy=h/2, R=w/2-6;
  var c=document.createElement("canvas"); c.width=w; c.height=h;
  var ctx=c.getContext("2d");

  var bg=ctx.createRadialGradient(cx-R*0.15,cy-R*0.2,4,cx,cy,R*1.08);
  bg.addColorStop(0,"#b83016");
  bg.addColorStop(0.3,"#8a1a08");
  bg.addColorStop(0.65,"#620e04");
  bg.addColorStop(1,"#300400");
  ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);

  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();

  // Wax surface texture
  for(var n=0;n<250;n++){
    var nx=Math.random()*w,ny=Math.random()*h,nr=5+Math.random()*22;
    var ng=ctx.createRadialGradient(nx,ny,0,nx,ny,nr);
    var bright=Math.random()>0.55;
    ng.addColorStop(0,bright?"rgba(180,60,30,0.12)":"rgba(10,0,0,0.16)");
    ng.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle=ng; ctx.fillRect(0,0,w,h);
  }
  // Flow lines
  for(var fl=0;fl<55;fl++){
    var fa=Math.random()*Math.PI*2;
    var fr1=8+Math.random()*25, fr2=fr1+20+Math.random()*80;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(fa)*fr1,cy+Math.sin(fa)*fr1);
    ctx.lineTo(cx+Math.cos(fa+0.09)*fr2,cy+Math.sin(fa+0.09)*fr2);
    ctx.strokeStyle="rgba(160,40,15,"+(0.04+Math.random()*0.07)+")";
    ctx.lineWidth=0.6+Math.random()*1.8; ctx.stroke();
  }
  // Concentric rings
  for(var rr=12;rr<R-2;rr+=3.8){
    ctx.beginPath(); ctx.arc(cx,cy,rr,0,Math.PI*2);
    ctx.strokeStyle="rgba(160,50,15,"+(0.012+Math.abs(Math.sin(rr*0.45))*0.014)+")";
    ctx.lineWidth=0.35; ctx.stroke();
  }
  // Light from upper-left
  ctx.globalCompositeOperation="overlay";
  var hl=ctx.createLinearGradient(cx-R*0.6,cy-R*0.65,cx+R*0.45,cy+R*0.5);
  hl.addColorStop(0,"rgba(240,160,100,0.28)");
  hl.addColorStop(0.4,"rgba(160,70,30,0.10)");
  hl.addColorStop(1,"rgba(20,0,0,0.30)");
  ctx.fillStyle=hl; ctx.fillRect(0,0,w,h);
  ctx.globalCompositeOperation="source-over";

  // Vignette
  var vig=ctx.createRadialGradient(cx,cy,R*0.42,cx,cy,R);
  vig.addColorStop(0,"rgba(0,0,0,0)");
  vig.addColorStop(0.68,"rgba(12,2,0,0.16)");
  vig.addColorStop(1,"rgba(35,4,0,0.62)");
  ctx.fillStyle=vig; ctx.fillRect(0,0,w,h);

  ctx.restore();

  // Rim
  ctx.beginPath(); ctx.arc(cx,cy,R+1,0,Math.PI*2);
  ctx.strokeStyle="#140200"; ctx.lineWidth=5; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle="#8a1808"; ctx.lineWidth=9; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,R+0.5,0,Math.PI*2);
  ctx.strokeStyle="#c03818"; ctx.lineWidth=3; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,R-5,0,Math.PI*2);
  ctx.strokeStyle="rgba(25,3,0,0.68)"; ctx.lineWidth=2.5; ctx.stroke();

  return new THREE.CanvasTexture(c);
}

// ══════════════════════════════════════════════════════
// EDGE WAX TEXTURE
// ══════════════════════════════════════════════════════
function makeWaxEdgeTex(w, h) {
  var c=document.createElement("canvas"); c.width=w; c.height=h;
  var ctx=c.getContext("2d");
  ctx.fillStyle="#7a1208"; ctx.fillRect(0,0,w,h);
  for(var i=0;i<h;i+=3){
    ctx.fillStyle="rgba("+(80+Math.random()*40)+","+Math.round(Math.random()*20)+",0,"+(0.15+Math.random()*0.2)+")";
    ctx.fillRect(0,i,w,1+Math.random()*2);
  }
  // Drip marks
  for(var d=0;d<20;d++){
    var dx=Math.random()*w;
    var dg=ctx.createLinearGradient(dx,0,dx,h*0.6);
    dg.addColorStop(0,"rgba(180,40,10,0.25)");
    dg.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle=dg; ctx.fillRect(dx-2,0,5,h*0.6);
  }
  var et=new THREE.CanvasTexture(c);
  et.wrapS=et.wrapT=THREE.RepeatWrapping; et.repeat.set(6,1);
  return et;
}

// ══════════════════════════════════════════════════════
// MATERIALS (placeholder until image loads)
// ══════════════════════════════════════════════════════
var waxColor=0x8a1808;
var frontMat=new THREE.MeshStandardMaterial({
  map: makeWaxBackTex(512,512),   // temp; replaced when img loads
  color:0xffffff, roughness:0.68, metalness:0.03,
  emissive:new THREE.Color(0x2a0402), emissiveIntensity:0.22
});
var backMat=new THREE.MeshStandardMaterial({
  map: makeWaxBackTex(512,512),
  color:0xffffff, roughness:0.72, metalness:0.02,
  emissive:new THREE.Color(0x200300), emissiveIntensity:0.18
});
var edgeMat=new THREE.MeshStandardMaterial({
  map: makeWaxEdgeTex(512,64),
  color:0xb01808, roughness:0.78, metalness:0.0,
  emissive:0x1a0200, emissiveIntensity:0.20
});
var rimMat=new THREE.MeshStandardMaterial({
  color:0x9a1408, roughness:0.62, metalness:0.05,
  emissive:0x280200, emissiveIntensity:0.25
});

// Load seal image → rebuild front texture
var sealImg=new Image();
sealImg.onload=function(){
  frontMat.map=buildSealTex(sealImg,1024,1024);
  frontMat.needsUpdate=true;
};
sealImg.src=SEAL_IMG;

// ══════════════════════════════════════════════════════
// GEOMETRY — identical to talar structure
// ══════════════════════════════════════════════════════
var coin=new THREE.Group();
scene.add(coin);

var SEG=128;
var COIN_R=2.3;
var COIN_T=0.26;   // slightly thicker — wax seal is chunkier than gold coin

// Front face (seal side)
var obvMesh=new THREE.Mesh(
  new THREE.CylinderGeometry(COIN_R-0.01,COIN_R-0.01,0.015,SEG),
  frontMat
);
obvMesh.rotation.x=Math.PI/2;
obvMesh.position.z=COIN_T/2+0.005;
obvMesh.castShadow=true;
coin.add(obvMesh);

// Back face (plain wax)
var revMesh=new THREE.Mesh(
  new THREE.CylinderGeometry(COIN_R-0.01,COIN_R-0.01,0.015,SEG),
  backMat
);
revMesh.rotation.x=-Math.PI/2;
revMesh.position.z=-COIN_T/2-0.005;
revMesh.castShadow=true;
coin.add(revMesh);

// Edge cylinder
var edgeGeo=new THREE.CylinderGeometry(COIN_R,COIN_R,COIN_T,SEG,1,true);
var edgeMesh2=new THREE.Mesh(edgeGeo,edgeMat);
edgeMesh2.rotation.x=Math.PI/2;
edgeMesh2.castShadow=true;
coin.add(edgeMesh2);

// Wax drip bumps on edge (instead of milled reeds)
for(var w2=0;w2<32;w2++){
  var ra=(w2/32)*Math.PI*2;
  var bump=new THREE.Mesh(
    new THREE.SphereGeometry(0.055+Math.random()*0.04,8,8),
    rimMat
  );
  bump.position.set(Math.cos(ra)*COIN_R, Math.sin(ra)*COIN_R, (Math.random()-0.5)*COIN_T*0.6);
  coin.add(bump);
}

// Raised rim torus front
var rimFront=new THREE.Mesh(
  new THREE.TorusGeometry(COIN_R-0.08,0.065,12,SEG), rimMat
);
rimFront.position.z=COIN_T/2+0.04; coin.add(rimFront);

var rimBack=new THREE.Mesh(
  new THREE.TorusGeometry(COIN_R-0.08,0.065,12,SEG), rimMat
);
rimBack.position.z=-COIN_T/2-0.04; coin.add(rimBack);

// ══════════════════════════════════════════════════════
// LIGHTS — warm candle/torch atmosphere
// ══════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x200805,0.5));

var keyL=new THREE.SpotLight(0xffb050,8,20,Math.PI/7,0.38,1.5);
keyL.position.set(4,6,5);
keyL.castShadow=true;
keyL.shadow.mapSize.set(2048,2048);
keyL.shadow.bias=-0.001;
scene.add(keyL); scene.add(keyL.target);

var fillL=new THREE.PointLight(0xff5818,3.0,14,2);
fillL.position.set(-5,1,4);
scene.add(fillL);

var rimL2=new THREE.DirectionalLight(0x901008,0.35);
rimL2.position.set(-1,3,-7);
scene.add(rimL2);

var topL=new THREE.PointLight(0xffa030,2.8,12,2);
topL.position.set(0,7,1);
scene.add(topL);

var underL=new THREE.PointLight(0x600808,1.2,8,2);
underL.position.set(0,-4,1);
scene.add(underL);

// ══════════════════════════════════════════════════════
// DUST PARTICLES
// ══════════════════════════════════════════════════════
var DC=80;
var dG=new THREE.BufferGeometry();
var dP=new Float32Array(DC*3);
var dV=[];
for(var i=0;i<DC;i++){
  dP[i*3]=(Math.random()-0.5)*14; dP[i*3+1]=(Math.random()-0.5)*10;
  dP[i*3+2]=(Math.random()-0.5)*8;
  dV.push({vx:(Math.random()-0.5)*0.003,vy:0.001+Math.random()*0.002,vz:(Math.random()-0.5)*0.002});
}
dG.setAttribute("position",new THREE.BufferAttribute(dP,3));
scene.add(new THREE.Points(dG,new THREE.PointsMaterial({
  color:0xc03010, size:0.026, transparent:true, opacity:0.22, sizeAttenuation:true
})));

// ══════════════════════════════════════════════════════
// ANIMATION — identical phases to talar
// ══════════════════════════════════════════════════════
var phase="appear", elapsed=0, rotsDone=0, accum=0;
coin.scale.set(0,0,0);
coin.position.z=-6;
var clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  var dt=Math.min(clock.getDelta(),0.05);
  elapsed+=dt;

  // Flickering candle
  fillL.intensity=2.8+Math.sin(elapsed*5.8)*0.7+Math.sin(elapsed*12.1)*0.3;
  topL.intensity =2.5+Math.sin(elapsed*4.2+0.9)*0.5;
  keyL.intensity =7+Math.sin(elapsed*4.9+0.3)*1.4;

  // Dust
  for(var i=0;i<DC;i++){
    dP[i*3]+=dV[i].vx; dP[i*3+1]+=dV[i].vy; dP[i*3+2]+=dV[i].vz;
    if(dP[i*3+1]>5){dP[i*3+1]=-4;dP[i*3]=(Math.random()-0.5)*14;}
  }
  dG.attributes.position.needsUpdate=true;

  if(phase==="appear"){
    var t=Math.min(elapsed/1.8,1);
    var e=t<0.75?4*t*t*t:1-(Math.pow(-2*t+2,3)/2);
    var s=e+(t>0.85?Math.sin((t-0.85)/0.15*Math.PI)*0.065:0);
    s=Math.min(s,1.06);
    coin.scale.set(s,s,s);
    coin.position.z=-6*(1-e)*(1-e);
    coin.rotation.y=-1.5*(1-e);
    if(elapsed>2.2){phase="wait";elapsed=0;}
  }
  else if(phase==="wait"){
    coin.scale.set(1,1,1); coin.position.z=0;
    coin.position.y=Math.sin(elapsed*1.1)*0.02;
    if(elapsed>0.9){phase="rotate";elapsed=0;rotsDone=0;accum=0;}
  }
  else if(phase==="rotate"){
    var spd=2.8;
    coin.rotation.y=accum+Math.min(elapsed/spd,1)*Math.PI*2;
    coin.position.y=Math.sin(elapsed*1.4)*0.02;
    if(elapsed>=spd){
      accum+=Math.PI*2; elapsed=0; rotsDone++;
      if(rotsDone>=3){phase="idle";coin.rotation.y=0;elapsed=0;}
    }
  }
  else{
    coin.position.y=Math.sin(elapsed*0.75)*0.06;
    coin.rotation.y+=0.004;
    coin.rotation.x=Math.sin(elapsed*0.3)*0.04;
  }

  renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",function(){
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
