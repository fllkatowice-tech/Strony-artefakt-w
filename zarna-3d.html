<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Żarna Starożytne – 3D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0a06;
    overflow: hidden;
    font-family: 'Cinzel', serif;
    color: #c9a84c;
  }

  #canvas-container {
    width: 100vw;
    height: 100vh;
    position: relative;
  }

  canvas { display: block; }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 10;
    opacity: 0.4;
  }

  /* Vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.75) 100%);
    pointer-events: none;
    z-index: 9;
  }

  /* UI Overlay */
  .ui-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 28px 40px 20px;
    z-index: 20;
    background: linear-gradient(to bottom, rgba(10,7,2,0.9) 0%, transparent 100%);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .title-block h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.1rem, 2.5vw, 1.9rem);
    color: #d4a94e;
    letter-spacing: 0.2em;
    text-shadow: 0 0 30px rgba(212,169,78,0.5), 0 2px 4px rgba(0,0,0,0.8);
    line-height: 1.2;
  }

  .title-block .subtitle {
    font-size: 0.65rem;
    color: #7a6335;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    margin-top: 5px;
  }

  /* Decorative divider */
  .ornament {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    color: #6b5228;
  }
  .ornament::before, .ornament::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, #6b5228);
    max-width: 60px;
  }
  .ornament::after { background: linear-gradient(to left, transparent, #6b5228); }

  /* Info panel */
  .info-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 20px 40px 28px;
    z-index: 20;
    background: linear-gradient(to top, rgba(10,7,2,0.95) 0%, transparent 100%);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .info-item {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .info-label {
    font-size: 0.52rem;
    letter-spacing: 0.4em;
    color: #5a4520;
    text-transform: uppercase;
  }

  .info-value {
    font-size: 0.8rem;
    color: #b8903c;
    letter-spacing: 0.1em;
  }

  /* Controls hint */
  .controls-hint {
    position: fixed;
    right: 30px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: center;
  }

  .ctrl-icon {
    width: 38px;
    height: 38px;
    border: 1px solid #3a2e18;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #5a4520;
    font-size: 0.55rem;
    letter-spacing: 0.05em;
    text-align: center;
    line-height: 1.3;
    background: rgba(10,7,2,0.6);
    transition: border-color 0.3s, color 0.3s;
    cursor: default;
  }

  .ctrl-icon:hover {
    border-color: #7a6335;
    color: #c9a84c;
  }

  .ctrl-divider {
    width: 1px;
    height: 20px;
    background: linear-gradient(to bottom, transparent, #3a2e18, transparent);
  }

  /* Animate button */
  .anim-btn {
    position: fixed;
    left: 40px;
    bottom: 90px;
    z-index: 20;
    background: rgba(10,7,2,0.8);
    border: 1px solid #6b5228;
    color: #c9a84c;
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.3em;
    padding: 10px 20px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s;
  }

  .anim-btn:hover {
    background: rgba(212,169,78,0.1);
    border-color: #d4a94e;
    box-shadow: 0 0 20px rgba(212,169,78,0.2);
  }

  /* Loading screen */
  #loading {
    position: fixed;
    inset: 0;
    background: #0d0a06;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    transition: opacity 0.8s ease;
  }

  #loading.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  .load-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.2rem;
    color: #c9a84c;
    letter-spacing: 0.3em;
    text-shadow: 0 0 30px rgba(212,169,78,0.4);
  }

  .load-bar-wrap {
    width: 200px;
    height: 2px;
    background: #1a1408;
    overflow: hidden;
  }

  .load-bar {
    height: 100%;
    background: linear-gradient(to right, #6b5228, #d4a94e);
    width: 0%;
    transition: width 0.05s;
    box-shadow: 0 0 10px rgba(212,169,78,0.6);
  }

  .load-sub {
    font-size: 0.55rem;
    letter-spacing: 0.5em;
    color: #5a4520;
    text-transform: uppercase;
  }

  /* Wheat particles overlay */
  #wheat-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 8;
    overflow: hidden;
  }

  .wheat-particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: #c9a84c;
    border-radius: 50%;
    opacity: 0;
    animation: fallDown var(--dur) var(--delay) infinite ease-in;
  }

  @keyframes fallDown {
    0% { transform: translateY(-20px) translateX(0) rotate(0deg); opacity: 0.6; }
    100% { transform: translateY(100vh) translateX(var(--drift)) rotate(360deg); opacity: 0; }
  }

  /* Border decorations */
  .corner {
    position: fixed;
    width: 60px;
    height: 60px;
    z-index: 20;
    opacity: 0.4;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner.tl { top: 8px; left: 8px; }
  .corner.tr { top: 8px; right: 8px; transform: scaleX(-1); }
  .corner.bl { bottom: 8px; left: 8px; transform: scaleY(-1); }
  .corner.br { bottom: 8px; right: 8px; transform: scale(-1); }
</style>
</head>
<body>

  <div class="load-bar-wrap"><div class="load-bar" id="loadBar"></div></div>

</div>

<!-- Corner decorations -->
<div class="corner tl">

    <path d="M2 20 L10 12" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
    <path d="M20 2 L12 10" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
    <circle cx="2" cy="2" r="2.5" fill="#c9a84c"/>

    <circle cx="58" cy="2" r="1.5" fill="#c9a84c" opacity="0.4"/>

</div>
<div class="corner tr"><svg viewBox="0 0 60 60" fill="none"><path d="M2 58 L2 2 L58 2" stroke="#c9a84c" stroke-width="1.5"/><path d="M2 20 L10 12" stroke="#c9a84c" stroke-width="1" opacity="0.5"/><path d="M20 2 L12 10" stroke="#c9a84c" stroke-width="1" opacity="0.5"/><circle cx="2" cy="2" r="2.5" fill="#c9a84c"/></svg></div>
<div class="corner bl"><svg viewBox="0 0 60 60" fill="none"><path d="M2 58 L2 2 L58 2" stroke="#c9a84c" stroke-width="1.5"/><path d="M2 20 L10 12" stroke="#c9a84c" stroke-width="1" opacity="0.5"/><path d="M20 2 L12 10" stroke="#c9a84c" stroke-width="1" opacity="0.5"/><circle cx="2" cy="2" r="2.5" fill="#c9a84c"/></svg></div>
<div class="corner br"><svg viewBox="0 0 60 60" fill="none"><path d="M2 58 L2 2 L58 2" stroke="#c9a84c" stroke-width="1.5"/><path d="M2 20 L10 12" stroke="#c9a84c" stroke-width="1" opacity="0.5"/><path d="M20 2 L12 10" stroke="#c9a84c" stroke-width="1" opacity="0.5"/><circle cx="2" cy="2" r="2.5" fill="#c9a84c"/></svg></div>

<!-- Wheat particles -->
<div id="wheat-overlay"></div>

<!-- Main canvas -->
<div id="canvas-container">
  <canvas id="canvas"></canvas>
</div>

<!-- UI Header -->
<div class="ui-header">
  <div class="title-block">
    <h1>Żarna Kamienne</h1>
    <div class="subtitle">Starożytne narzędzie przemiału ziarna</div>
    <div class="ornament">◆</div>
  </div>
</div>

<!-- Controls hint -->
<div class="controls-hint">
  <div class="ctrl-icon">LPM<br>Obróć</div>
  <div class="ctrl-divider"></div>
  <div class="ctrl-icon">PPM<br>Przesuń</div>
  <div class="ctrl-divider"></div>
  <div class="ctrl-icon">Scroll<br>Zoom</div>
</div>

<!-- Bottom info -->
<div class="info-panel">
  <div class="info-item">
    <span class="info-label">Materiał</span>
    <span class="info-value">Bazalt &amp; Granit</span>
  </div>
  <div class="info-item" style="text-align:center;">
    <span class="info-label">Okres</span>
    <span class="info-value">~8000 – 3000 p.n.e.</span>
  </div>
  <div class="info-item" style="text-align:right;">
    <span class="info-label">Typ</span>
    <span class="info-value">Żarno siodłowe / rotacyjne</span>

</div>

<!-- Animate button -->
<button class="anim-btn" id="animBtn" onclick="toggleAnimation()">⚙ Uruchom Przemiał</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── LOADING BAR ───────────────────────────────────────────────
const loadBar = document.getElementById('loadBar');
const loadingEl = document.getElementById('loading');
let loadPct = 0;
const loadInterval = setInterval(() => {
  loadPct += Math.random() * 12;
  if (loadPct >= 100) { loadPct = 100; clearInterval(loadInterval); }
  loadBar.style.width = loadPct + '%';
}, 80);

// ─── WHEAT PARTICLES ───────────────────────────────────────────
const wheatOverlay = document.getElementById('wheat-overlay');
for (let i = 0; i < 40; i++) {
  const p = document.createElement('div');
  p.classList.add('wheat-particle');
  p.style.setProperty('--dur', (4 + Math.random() * 8) + 's');
  p.style.setProperty('--delay', (Math.random() * 10) + 's');
  p.style.setProperty('--drift', (Math.random() * 100 - 50) + 'px');
  p.style.left = (Math.random() * 100) + '%';
  p.style.width = (1 + Math.random() * 3) + 'px';
  p.style.height = p.style.width;
  wheatOverlay.appendChild(p);
}

// ─── THREE.JS SCENE ────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;

const scene = new THREE.Scene();
scene.background = null;
scene.fog = new THREE.FogExp2(0x0d0a06, 0.04);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(3.5, 4.5, 6.5);
camera.lookAt(0, 0.5, 0);

// ─── TEXTURES (procedural) ─────────────────────────────────────
function createStoneTexture(color1, color2, size = 512, roughness = 0.7) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  
  const bg = ctx.createLinearGradient(0, 0, size, size);
  bg.addColorStop(0, color1);
  bg.addColorStop(0.5, color2);
  bg.addColorStop(1, color1);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, size, size);
  
  // Cracks
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 25; i++) {
    ctx.beginPath();
    const x = Math.random() * size; const y = Math.random() * size;
    const len = 20 + Math.random() * 80;
    const angle = Math.random() * Math.PI;
    ctx.moveTo(x, y);
    let cx = x, cy = y;
    for (let s = 0; s < 5; s++) {
      cx += Math.cos(angle + (Math.random()-0.5) * 1.5) * len/5;
      cy += Math.sin(angle + (Math.random()-0.5) * 1.5) * len/5;
      ctx.lineTo(cx, cy);
    }
    ctx.globalAlpha = 0.3 + Math.random() * 0.4;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Noise stipple
  for (let i = 0; i < size * size * 0.12; i++) {
    const x = Math.random() * size; const y = Math.random() * size;
    const brt = Math.random() > 0.5 ? 'rgba(255,255,255,' : 'rgba(0,0,0,';
    ctx.fillStyle = brt + (0.02 + Math.random() * 0.08) + ')';
    ctx.fillRect(x, y, 1.5, 1.5);
  }

  // Grooves (radial scratches for grinding surface)
  ctx.strokeStyle = 'rgba(0,0,0,0.12)';
  for (let i = 0; i < 40; i++) {
    ctx.beginPath();
    const cx = size / 2, cy = size / 2;
    const r = 10 + Math.random() * size * 0.45;
    const a1 = Math.random() * Math.PI * 2;
    const a2 = a1 + (Math.random() * 0.8 + 0.1);
    ctx.arc(cx, cy, r, a1, a2);
    ctx.lineWidth = 0.5 + Math.random() * 2;
    ctx.globalAlpha = 0.3 + Math.random() * 0.5;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(2, 2);
  return tex;
}

function createNormalMap(size = 256) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#8080ff';
  ctx.fillRect(0, 0, size, size);
  for (let i = 0; i < 2000; i++) {
    const x = Math.random() * size, y = Math.random() * size;
    const r = 2 + Math.random() * 8;
    const grd = ctx.createRadialGradient(x, y, 0, x, y, r);
    grd.addColorStop(0, `rgba(${100+Math.random()*80|0},${100+Math.random()*80|0},255,0.5)`);
    grd.addColorStop(1, 'rgba(128,128,255,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  }
  return new THREE.CanvasTexture(c);
}

function createRoughnessMap(size = 256) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#888';
  ctx.fillRect(0, 0, size, size);
  for (let i = 0; i < 4000; i++) {
    const x = Math.random()*size, y = Math.random()*size;
    const v = 80 + Math.random()*150;
    ctx.fillStyle = `rgba(${v|0},${v|0},${v|0},0.3)`;
    ctx.fillRect(x, y, 2, 2);
  }
  return new THREE.CanvasTexture(c);
}

const stoneTex = createStoneTexture('#5a4f3e', '#3d3528');
const stoneTex2 = createStoneTexture('#4a4238', '#6e5f4a');
const normalMap = createNormalMap();
const roughMap = createRoughnessMap();

// ─── MATERIALS ─────────────────────────────────────────────────
const lowerStoneMat = new THREE.MeshStandardMaterial({
  map: stoneTex,
  normalMap: normalMap,
  roughnessMap: roughMap,
  color: 0x7a6a52,
  roughness: 0.9,
  metalness: 0.05,
  normalScale: new THREE.Vector2(1.5, 1.5)
});

const upperStoneMat = new THREE.MeshStandardMaterial({
  map: stoneTex2,
  normalMap: normalMap,
  roughnessMap: roughMap,
  color: 0x6a5c47,
  roughness: 0.85,
  metalness: 0.04,
  normalScale: new THREE.Vector2(2, 2)
});

const woodMat = new THREE.MeshStandardMaterial({
  color: 0x5c3d1a,
  roughness: 0.85,
  metalness: 0.0,
});

const woodDarkMat = new THREE.MeshStandardMaterial({
  color: 0x3a2410,
  roughness: 0.9,
  metalness: 0.0,
});

const ironMat = new THREE.MeshStandardMaterial({
  color: 0x4a4035,
  roughness: 0.7,
  metalness: 0.6,
});

const grainMat = new THREE.MeshStandardMaterial({
  color: 0xe8c96d,
  roughness: 0.9,
  metalness: 0.0,
});

const flourMat = new THREE.MeshStandardMaterial({
  color: 0xf0e8c8,
  roughness: 1.0,
  metalness: 0.0,
  transparent: true,
  opacity: 0.85
});

// ─── GEOMETRY HELPERS ──────────────────────────────────────────
function addEngravings(mesh) {
  // Add decorative carved lines on disk surface
}

// Create a beveled cylinder (millstone shape with stepped edges)
function createMillstoneLower() {
  const group = new THREE.Group();
  
  // Main base disc - lower stone (flat on top, slightly rounded rim)
  const mainGeo = new THREE.CylinderGeometry(2.4, 2.5, 0.38, 72, 4);
  const main = new THREE.Mesh(mainGeo, lowerStoneMat);
  main.castShadow = true;
  main.receiveShadow = true;
  group.add(main);

  // Rim bevel top
  const bevelTopGeo = new THREE.CylinderGeometry(2.45, 2.4, 0.06, 72);
  const bevelTop = new THREE.Mesh(bevelTopGeo, lowerStoneMat);
  bevelTop.position.y = 0.22;
  bevelTop.castShadow = true;
  group.add(bevelTop);

  // Rim bevel bottom
  const bevelBotGeo = new THREE.CylinderGeometry(2.5, 2.45, 0.06, 72);
  const bevelBot = new THREE.Mesh(bevelBotGeo, lowerStoneMat);
  bevelBot.position.y = -0.22;
  group.add(bevelBot);

  // Center hole (slightly raised collar)
  const holeCollarGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.08, 32);
  const holeCollar = new THREE.Mesh(holeCollarGeo, lowerStoneMat);
  holeCollar.position.y = 0.23;
  group.add(holeCollar);

  // Flour channel groove ring (carved into top surface edge)
  const channelGeo = new THREE.TorusGeometry(2.0, 0.04, 8, 72);
  const channel = new THREE.Mesh(channelGeo, new THREE.MeshStandardMaterial({
    color: 0x2a2018, roughness: 0.95, metalness: 0
  }));
  channel.rotation.x = Math.PI / 2;
  channel.position.y = 0.2;
  group.add(channel);

  // Small decorative carved ring
  const ring2Geo = new THREE.TorusGeometry(1.5, 0.025, 8, 72);
  const ring2 = new THREE.Mesh(ring2Geo, new THREE.MeshStandardMaterial({
    color: 0x2a2018, roughness: 0.95, metalness: 0
  }));
  ring2.rotation.x = Math.PI / 2;
  ring2.position.y = 0.21;
  group.add(ring2);

  // Radial grooves (grinding furrows - "bilge" pattern)
  const furrowMat = new THREE.MeshStandardMaterial({ color: 0x1a1408, roughness: 1.0 });
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    for (let j = 0; j < 3; j++) {
      const furGeo = new THREE.BoxGeometry(0.025, 0.012, 1.2);
      const fur = new THREE.Mesh(furGeo, furrowMat);
      const r = 0.7 + j * 0.42;
      fur.position.set(
        Math.cos(angle) * r,
        0.21,
        Math.sin(angle) * r
      );
      fur.rotation.y = -angle + Math.PI / 2;
      group.add(fur);
    }
  }

  // Side decorations - chiseled pattern
  for (let i = 0; i < 24; i++) {
    const angle = (i / 24) * Math.PI * 2;
    const notchGeo = new THREE.BoxGeometry(0.06, 0.08, 0.03);
    const notch = new THREE.Mesh(notchGeo, new THREE.MeshStandardMaterial({
      color: 0x2a2018, roughness: 1.0
    }));
    notch.position.set(Math.cos(angle) * 2.42, 0.05, Math.sin(angle) * 2.42);
    notch.rotation.y = -angle;
    group.add(notch);
  }

  return group;
}

function createMillstoneUpper() {
  const group = new THREE.Group();
  
  // Main upper disc WITH HOLE using ExtrudeGeometry
  const discShape = new THREE.Shape();
  discShape.absarc(0, 0, 2.35, 0, Math.PI * 2, false);
  const holeRad = 0.38;
  const holePath = new THREE.Path();
  holePath.absarc(0, 0, holeRad, 0, Math.PI * 2, true);
  discShape.holes.push(holePath);
  const extrudeSettings = { depth: 0.42, bevelEnabled: true, bevelThickness: 0.03, bevelSize: 0.03, bevelSegments: 4, steps: 1, curveSegments: 72 };
  const mainGeo = new THREE.ExtrudeGeometry(discShape, extrudeSettings);
  mainGeo.rotateX(-Math.PI / 2);
  mainGeo.translate(0, 0.21, 0);
  const main = new THREE.Mesh(mainGeo, upperStoneMat);
  main.castShadow = true;
  main.receiveShadow = true;
  group.add(main);

  // Inner hole rim - polished funnel edge
  const innerRimGeo = new THREE.CylinderGeometry(holeRad + 0.02, holeRad + 0.08, 0.12, 48);
  const innerRim = new THREE.Mesh(innerRimGeo, upperStoneMat);
  innerRim.position.y = 0.26;
  group.add(innerRim);

  // Rim bevel outer edge
  const bevelGeo = new THREE.CylinderGeometry(2.4, 2.35, 0.06, 72);
  const bevel = new THREE.Mesh(bevelGeo, upperStoneMat);
  bevel.position.y = -0.24;
  group.add(bevel);



  // Iron bands around perimeter
  for (let i = 0; i < 3; i++) {
    const bandGeo = new THREE.TorusGeometry(2.38, 0.028, 8, 72);
    const band = new THREE.Mesh(bandGeo, ironMat);
    band.rotation.x = Math.PI / 2;
    band.position.y = -0.15 + i * 0.15;
    group.add(band);
  }

  // Grinding furrows (on bottom face - pointing down)
  const furrowMatU = new THREE.MeshStandardMaterial({ color: 0x1a1408, roughness: 1.0 });
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2 + 0.13;
    for (let j = 0; j < 3; j++) {
      const furGeo = new THREE.BoxGeometry(0.025, 0.012, 1.1);
      const fur = new THREE.Mesh(furGeo, furrowMatU);
      const r = 0.65 + j * 0.42;
      fur.position.set(Math.cos(angle) * r, -0.22, Math.sin(angle) * r);
      fur.rotation.y = -angle + Math.PI / 2;
      group.add(fur);
    }
  }

  // Side inscription marks (runes / dots pattern)
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    const markGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.025, 8);
    const mark = new THREE.Mesh(markGeo, new THREE.MeshStandardMaterial({
      color: 0x1a1408, roughness: 1.0
    }));
    mark.rotation.z = Math.PI / 2;
    mark.position.set(Math.cos(angle) * 2.36, 0.12, Math.sin(angle) * 2.36);
    mark.rotation.y = -angle;
    group.add(mark);
  }

  return group;
}

function createWoodenHandle() {
  const group = new THREE.Group();

  // Main handle shaft - slightly tapered
  const shaftGeo = new THREE.CylinderGeometry(0.07, 0.09, 2.8, 12);
  const shaft = new THREE.Mesh(shaftGeo, woodMat);
  shaft.castShadow = true;
  group.add(shaft);

  // Hand grip - wrapped section
  for (let i = 0; i < 8; i++) {
    const wrapGeo = new THREE.TorusGeometry(0.09, 0.018, 8, 24);
    const wrap = new THREE.Mesh(wrapGeo, woodDarkMat);
    wrap.rotation.x = Math.PI / 2;
    wrap.position.y = 0.5 + i * 0.18;
    group.add(wrap);
  }

  // Top knob
  const knobGeo = new THREE.SphereGeometry(0.12, 16, 12);
  const knob = new THREE.Mesh(knobGeo, woodDarkMat);
  knob.position.y = 1.42;
  knob.castShadow = true;
  group.add(knob);

  // Iron band at base (where it meets stone)
  const ironBandGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.1, 16);
  const ironBand = new THREE.Mesh(ironBandGeo, ironMat);
  ironBand.position.y = -1.3;
  group.add(ironBand);

  return group;
}

function createHopper() {
  // Wooden funnel / hopper above the millstone
  const group = new THREE.Group();

  // 4 angled hopper walls
  for (let i = 0; i < 4; i++) {
    const angle = (i / 4) * Math.PI * 2 + Math.PI / 4;
    const wallGeo = new THREE.BoxGeometry(0.7, 0.9, 0.04);
    const wall = new THREE.Mesh(wallGeo, woodMat);
    wall.position.set(Math.cos(angle) * 0.38, 0.35, Math.sin(angle) * 0.38);
    wall.rotation.y = -angle;
    wall.rotation.x = Math.cos(angle + Math.PI/4) * 0.45;
    wall.rotation.z = Math.sin(angle + Math.PI/4) * -0.45;
    wall.castShadow = true;
    group.add(wall);
  }

  // Top rim frame
  const rimGeo = new THREE.TorusGeometry(0.55, 0.025, 8, 4);
  const rim = new THREE.Mesh(rimGeo, woodDarkMat);
  rim.rotation.x = Math.PI / 2;
  rim.rotation.z = Math.PI / 4;
  rim.position.y = 0.7;
  group.add(rim);

  return group;
}

function createBase() {
  // Stone base / foundation slab
  const group = new THREE.Group();

  // Main flat slab
  const slabGeo = new THREE.BoxGeometry(5.5, 0.18, 5.5);
  const slab = new THREE.Mesh(slabGeo, lowerStoneMat);
  slab.receiveShadow = true;
  group.add(slab);

  // Chiseled edge
  const edgeGeo = new THREE.BoxGeometry(5.7, 0.06, 5.7);
  const edge = new THREE.Mesh(edgeGeo, new THREE.MeshStandardMaterial({
    color: 0x4a4030, roughness: 0.95, metalness: 0.0
  }));
  edge.position.y = -0.12;
  group.add(edge);

  // 4 corner blocks
  const corners = [[-2.2,-2.2],[2.2,-2.2],[-2.2,2.2],[2.2,2.2]];
  corners.forEach(([cx,cz]) => {
    const cGeo = new THREE.BoxGeometry(0.7, 0.14, 0.7);
    const cMesh = new THREE.Mesh(cGeo, lowerStoneMat);
    cMesh.position.set(cx, 0.16, cz);
    cMesh.receiveShadow = true;
    group.add(cMesh);
  });

  // Flour collection basin around stone
  const basinGeo = new THREE.CylinderGeometry(2.85, 3.0, 0.15, 48);
  const basin = new THREE.Mesh(basinGeo, new THREE.MeshStandardMaterial({
    color: 0x5a4e3a, roughness: 0.95, metalness: 0.0,
    map: stoneTex
  }));
  basin.position.y = 0.16;
  basin.receiveShadow = true;
  group.add(basin);

  // Basin inner walls
  const basinInnerGeo = new THREE.CylinderGeometry(2.6, 2.65, 0.2, 48);
  const basinInner = new THREE.Mesh(basinInnerGeo, lowerStoneMat);
  basinInner.position.y = 0.23;
  group.add(basinInner);

  return group;
}

function createGrains() {
  // Scattered grain kernels on the base
  const group = new THREE.Group();




  return group;
}

// ─── ASSEMBLE SCENE ────────────────────────────────────────────
const base = createBase();
base.position.y = -1.2;
scene.add(base);

const lowerStone = createMillstoneLower();
lowerStone.position.y = -0.75;
scene.add(lowerStone);

const upperStone = createMillstoneUpper();
upperStone.position.y = -0.1;
scene.add(upperStone);



const hopper = createHopper();
hopper.position.y = 0.55;
scene.add(hopper);

const grains = createGrains();
scene.add(grains);

// ─── GRAIN FILL IN THE HOLE ────────────────────────────────────
// Grain pile filling the hole (visible from top)
const grainPileMat = new THREE.MeshStandardMaterial({ color: 0xd4a855, roughness: 0.95, metalness: 0.0 });
const grainPileGeo = new THREE.CylinderGeometry(0.36, 0.38, 0.18, 32);
const grainPile = new THREE.Mesh(grainPileGeo, grainPileMat);
grainPile.position.y = 0.22;
scene.add(grainPile);

// Domed top of grain pile (heaped up)
const grainDomeGeo = new THREE.SphereGeometry(0.36, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
const grainDome = new THREE.Mesh(grainDomeGeo, grainPileMat);
grainDome.position.y = 0.31;
scene.add(grainDome);

// Individual grain kernels scattered inside hole + spilling over top
const kernelMat = new THREE.MeshStandardMaterial({ color: 0xc49a30, roughness: 0.9, metalness: 0.0 });
const kernelMat2 = new THREE.MeshStandardMaterial({ color: 0xe8b84b, roughness: 0.9, metalness: 0.0 });
for (let i = 0; i < 120; i++) {
  const inHole = i < 70;
  const maxR = inHole ? 0.32 : 0.34 + Math.random() * 0.12;
  const angle = Math.random() * Math.PI * 2;
  const r = Math.random() * maxR;
  const x = Math.cos(angle) * r;
  const z = Math.sin(angle) * r;
  const baseY = inHole ? (0.32 + Math.random() * 0.15) : (0.32 + Math.random() * 0.05);

  const geo = new THREE.SphereGeometry(0.025 + Math.random() * 0.025, 6, 4);
  const mat = Math.random() > 0.5 ? kernelMat : kernelMat2;
  const kernel = new THREE.Mesh(geo, mat);
  kernel.position.set(x, baseY, z);
  kernel.scale.set(0.6 + Math.random() * 0.5, 0.45, 0.6 + Math.random() * 0.5);
  kernel.rotation.y = Math.random() * Math.PI;
  kernel.rotation.z = Math.random() * 0.5;
  scene.add(kernel);
}

// A few grains on top of upper stone surface around the hole
for (let i = 0; i < 30; i++) {
  const angle = Math.random() * Math.PI * 2;
  const r = 0.42 + Math.random() * 0.4;
  const geo = new THREE.SphereGeometry(0.022 + Math.random() * 0.02, 6, 4);
  const mat = Math.random() > 0.5 ? kernelMat : kernelMat2;
  const kernel = new THREE.Mesh(geo, mat);
  kernel.position.set(Math.cos(angle) * r, 0.22, Math.sin(angle) * r);
  kernel.scale.set(0.6 + Math.random() * 0.5, 0.4, 0.6 + Math.random() * 0.5);
  kernel.rotation.y = Math.random() * Math.PI;
  scene.add(kernel);
}



// ─── LIGHTING ──────────────────────────────────────────────────
// Ambient

scene.add(ambient);

mainLight.castShadow = true;
mainLight.shadow.mapSize.set(2048, 2048);
mainLight.shadow.camera.near = 0.1;
mainLight.shadow.camera.far = 40;
mainLight.shadow.camera.left = -8;
mainLight.shadow.camera.right = 8;
mainLight.shadow.camera.top = 8;

mainLight.shadow.bias = -0.001;

torchLight.position.set(-3, 3, -2);

scene.add(torchLight);

// Rim light

scene.add(rimLight);

// ─── GROUND ────────────────────────────────────────────────────
const groundGeo = new THREE.PlaneGeometry(30, 30, 8, 8);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x1a1408,
  roughness: 1.0,
  metalness: 0.0,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -1.32;
ground.receiveShadow = true;
scene.add(ground);

// ─── ORBIT CONTROLS (manual) ───────────────────────────────────
let isDragging = false, isRightDrag = false;
let prevMouse = { x: 0, y: 0 };
let spherical = { theta: 0.5, phi: 1.0, radius: 9.5 };
let panOffset = { x: 0, y: 0 };
let targetSpherical = { ...spherical };
let targetPan = { ...panOffset };

function updateCamera() {
  const s = spherical;
  camera.position.set(
    panOffset.x + s.radius * Math.sin(s.phi) * Math.sin(s.theta),
    panOffset.y + s.radius * Math.cos(s.phi),
    s.radius * Math.sin(s.phi) * Math.cos(s.theta)
  );
  camera.lookAt(panOffset.x, panOffset.y, 0);
}

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  isRightDrag = e.button === 2;
  prevMouse = { x: e.clientX, y: e.clientY };
});

window.addEventListener('mouseup', () => isDragging = false);

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  prevMouse = { x: e.clientX, y: e.clientY };

  if (isRightDrag) {
    targetPan.x -= dx * 0.008;
    targetPan.y += dy * 0.008;
  } else {
    targetSpherical.theta -= dx * 0.008;
    targetSpherical.phi = Math.max(0.1, Math.min(Math.PI * 0.48, targetSpherical.phi + dy * 0.007));
  }
});

canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('wheel', e => {
  targetSpherical.radius = Math.max(3, Math.min(20, targetSpherical.radius + e.deltaY * 0.015));
});

// Touch support
let prevTouch = null;
canvas.addEventListener('touchstart', e => {
  isDragging = true;
  prevTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
canvas.addEventListener('touchend', () => { isDragging = false; prevTouch = null; });
canvas.addEventListener('touchmove', e => {
  if (!prevTouch) return;
  const dx = e.touches[0].clientX - prevTouch.x;
  const dy = e.touches[0].clientY - prevTouch.y;
  prevTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  targetSpherical.theta -= dx * 0.008;
  targetSpherical.phi = Math.max(0.1, Math.min(Math.PI * 0.48, targetSpherical.phi + dy * 0.007));
}, { passive: true });

// ─── ANIMATION STATE ───────────────────────────────────────────
let isAnimating = false;
let animTime = 0;
let grindSpeed = 0;
let grainParticles = [];

function toggleAnimation() {
  isAnimating = !isAnimating;
  const btn = document.getElementById('animBtn');
  btn.textContent = isAnimating ? '⏸ Zatrzymaj Przemiał' : '⚙ Uruchom Przemiał';
}

// ─── RENDER LOOP ───────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  animTime += dt;

  // Smooth camera interpolation
  spherical.theta += (targetSpherical.theta - spherical.theta) * 0.08;
  spherical.phi += (targetSpherical.phi - spherical.phi) * 0.08;
  spherical.radius += (targetSpherical.radius - spherical.radius) * 0.08;
  panOffset.x += (targetPan.x - panOffset.x) * 0.08;
  panOffset.y += (targetPan.y - panOffset.y) * 0.08;
  updateCamera();

  // Torch flicker
  torchLight.intensity = 2.0 + Math.sin(animTime * 3.7) * 0.3 + Math.sin(animTime * 7.1) * 0.15;
  torchLight.position.x = -3 + Math.sin(animTime * 2.3) * 0.08;

  // Animation: grinding
  if (isAnimating) {
    grindSpeed = Math.min(grindSpeed + dt * 0.8, 1.0);
  } else {
    grindSpeed = Math.max(grindSpeed - dt * 0.5, 0);
  }

  if (grindSpeed > 0.001) {
    upperStone.rotation.y += grindSpeed * dt * 1.5;
    
    // Slight vibration
    upperStone.position.y = -0.1 + Math.sin(animTime * 18) * grindSpeed * 0.003;
  }

  renderer.render(scene, camera);
}

// ─── RESIZE ────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── START ─────────────────────────────────────────────────────
updateCamera();
animate();

// Finish loading
setTimeout(() => {
  loadBar.style.width = '100%';
  setTimeout(() => { loadingEl.classList.add('fade-out'); }, 300);
}, 700);
</script>
