<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tron Mieszka II</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#000;
    width:100vw; height:100vh;
    overflow:hidden;
    font-family:'Palatino Linotype','Book Antiqua',Palatino,serif;
    cursor:crosshair; user-select:none;
  }
  canvas { display:block; position:fixed; inset:0; }

  #vignette {
    position:fixed; inset:0; pointer-events:none; z-index:8;
    background:radial-gradient(ellipse at 50% 50%, transparent 32%, rgba(0,0,0,0.80) 100%);
  }
  #grain {
    position:fixed; inset:0; pointer-events:none; z-index:9; opacity:0.030;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:150px; animation:gs 0.12s steps(1) infinite;
  }
  @keyframes gs{0%{transform:translate(0,0)}25%{transform:translate(-2px,2px)}50%{transform:translate(2px,-1px)}75%{transform:translate(-1px,3px)}}

  #title {
    position:fixed; top:26px; left:50%; transform:translateX(-50%);
    color:#e0b840;
    font-size:clamp(11px,1.0vw,15px);
    letter-spacing:9px; text-transform:uppercase;
    text-shadow:0 0 40px #c89020aa, 0 0 90px #a06010 55;
    white-space:nowrap; opacity:0;
    animation:fi 3s ease 1.2s forwards;
    pointer-events:none; z-index:12;
  }
  #subtitle {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    color:#7a5820;
    font-size:clamp(7px,0.62vw,9px);
    letter-spacing:5px; text-transform:uppercase;
    white-space:nowrap; opacity:0;
    animation:fi 2s ease 4s forwards;
    pointer-events:none; z-index:12;
  }
  #hint {
    position:fixed; bottom:52px; left:50%; transform:translateX(-50%);
    color:#4a3210;
    font-size:clamp(7px,0.58vw,8px);
    letter-spacing:4px; text-transform:uppercase;
    white-space:nowrap; opacity:0;
    animation:fi 2s ease 5s forwards, fo 2s ease 10s forwards;
    pointer-events:none; z-index:12;
  }
  /* Torch flicker overlay */
  #torch-overlay {
    position:fixed; inset:0; pointer-events:none; z-index:7;
    background:radial-gradient(ellipse at 50% 100%, rgba(200,110,20,0.06) 0%, transparent 55%);
    animation:tf 0.20s ease infinite alternate;
  }
  @keyframes tf{from{opacity:0.7}to{opacity:1.0}}
  @keyframes fi{to{opacity:1}}
  @keyframes fo{to{opacity:0}}
</style>
</head>
<body>
<div id="grain"></div>
<div id="vignette"></div>
<div id="torch-overlay"></div>
<div id="title">✦ &nbsp; M I E S Z K O &nbsp; I I &nbsp; L A M B E R T &nbsp; ✦</div>
<div id="subtitle">KRÓL POLSKI · 1025 – 1034 · KOMNATA TRONOWA</div>
<div id="hint">PRZECIĄGNIJ ABY ROZEJRZEĆ SIĘ</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ── Renderer ──────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled   = true;
renderer.shadowMap.type      = THREE.PCFSoftShadowMap;
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.78;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050403);
scene.fog = new THREE.FogExp2(0x080604, 0.042);

const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.02, 80);
camera.position.set(0, 1.65, 7.5);
camera.lookAt(0, 1.8, 0);

// ── Textures ──────────────────────────────────────────────────────────
function mkTex(w,h,fn){
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  fn(c.getContext('2d'),w,h);
  return new THREE.CanvasTexture(c);
}

const TEX = {
  stone: mkTex(512,512,(ctx,w,h)=>{
    ctx.fillStyle='#2e2618'; ctx.fillRect(0,0,w,h);
    for(let i=0;i<800;i++){
      ctx.beginPath(); ctx.arc(Math.random()*w,Math.random()*h,0.5+Math.random()*4.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(${70+Math.random()*45},${58+Math.random()*35},${35+Math.random()*22},${0.18+Math.random()*0.28})`; ctx.fill();
    }
    // mortar lines
    for(let r=0;r<12;r++){
      ctx.beginPath(); ctx.moveTo(0,r*44+Math.random()*8); ctx.lineTo(w,r*44+Math.random()*8);
      ctx.strokeStyle='rgba(15,10,5,0.25)'; ctx.lineWidth=2+Math.random(); ctx.stroke();
    }
    for(let c2=0;c2<14;c2++){
      ctx.beginPath(); ctx.moveTo(c2*38+Math.random()*10,0); ctx.lineTo(c2*38+Math.random()*10,h);
      ctx.strokeStyle='rgba(15,10,5,0.18)'; ctx.lineWidth=1+Math.random(); ctx.stroke();
    }
  }),
  floor: mkTex(512,512,(ctx,w,h)=>{
    ctx.fillStyle='#3a2e1e'; ctx.fillRect(0,0,w,h);
    for(let i=0;i<1000;i++){
      ctx.beginPath(); ctx.arc(Math.random()*w,Math.random()*h,0.3+Math.random()*3,0,Math.PI*2);
      ctx.fillStyle=`rgba(${80+Math.random()*40},${65+Math.random()*30},${35+Math.random()*20},${0.15+Math.random()*0.25})`; ctx.fill();
    }
    // plank lines
    for(let i=0;i<10;i++){
      ctx.beginPath(); ctx.moveTo(0,i*54+Math.random()*6); ctx.lineTo(w,i*54+Math.random()*6);
      ctx.strokeStyle='rgba(15,8,3,0.20)'; ctx.lineWidth=1.5; ctx.stroke();
    }
  }),
  wood: mkTex(512,128,(ctx,w,h)=>{
    ctx.fillStyle='#4a2c14'; ctx.fillRect(0,0,w,h);
    for(let i=0;i<35;i++){
      const y=i*4+Math.random()*3;
      ctx.beginPath(); ctx.moveTo(0,y); ctx.bezierCurveTo(128,y+Math.random()*3-1.5,384,y-Math.random()*3+1.5,512,y);
      ctx.strokeStyle=`rgba(${85+Math.random()*45},${52+Math.random()*28},${20+Math.random()*14},${0.30+Math.random()*0.40})`;
      ctx.lineWidth=0.8+Math.random()*1.5; ctx.stroke();
    }
  }),
  gold: mkTex(256,256,(ctx,w,h)=>{
    const g=ctx.createRadialGradient(80,70,5,128,128,160);
    g.addColorStop(0,'#fff088'); g.addColorStop(0.3,'#e8b818');
    g.addColorStop(0.7,'#b08008'); g.addColorStop(1,'#604800');
    ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
    for(let i=0;i<140;i++){
      ctx.beginPath(); ctx.arc(Math.random()*w,Math.random()*h,0.5+Math.random()*2.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,240,100,${0.06+Math.random()*0.20})`; ctx.fill();
    }
  }),
  redFabric: mkTex(256,256,(ctx,w,h)=>{
    ctx.fillStyle='#8a0c08'; ctx.fillRect(0,0,w,h);
    for(let i=0;i<256;i+=4){
      ctx.fillStyle=i%8===0?'rgba(0,0,0,0.18)':'rgba(255,255,255,0.04)';
      ctx.fillRect(0,i,w,2);
    }
    for(let j=0;j<256;j+=4){
      ctx.fillStyle=j%8===0?'rgba(0,0,0,0.14)':'rgba(255,255,255,0.03)';
      ctx.fillRect(j,0,2,h);
    }
    // gold embroidery dots
    for(let i=0;i<60;i++){
      ctx.beginPath(); ctx.arc(Math.random()*w,Math.random()*h,1+Math.random()*2,0,Math.PI*2);
      ctx.fillStyle=`rgba(220,170,20,${0.15+Math.random()*0.25})`; ctx.fill();
    }
  }),
  purpleFabric: mkTex(256,256,(ctx,w,h)=>{
    ctx.fillStyle='#3a1050'; ctx.fillRect(0,0,w,h);
    for(let i=0;i<256;i+=4){
      ctx.fillStyle=i%8===0?'rgba(0,0,0,0.20)':'rgba(255,255,255,0.04)';
      ctx.fillRect(0,i,w,2);
    }
    for(let j=0;j<256;j+=4){
      ctx.fillStyle=j%8===0?'rgba(0,0,0,0.15)':'rgba(255,255,255,0.03)';
      ctx.fillRect(j,0,2,h);
    }
    for(let i=0;i<50;i++){
      ctx.beginPath(); ctx.arc(Math.random()*w,Math.random()*h,1+Math.random()*2.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(230,180,30,${0.15+Math.random()*0.28})`; ctx.fill();
    }
  }),
  parchment: mkTex(256,256,(ctx,w,h)=>{
    ctx.fillStyle='#d8b870'; ctx.fillRect(0,0,w,h);
    const g=ctx.createRadialGradient(128,128,10,128,128,180);
    g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(40,20,5,0.35)');
    ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
    for(let i=0;i<30;i++){
      ctx.beginPath(); ctx.moveTo(Math.random()*w,Math.random()*h); ctx.lineTo(Math.random()*w,Math.random()*h);
      ctx.strokeStyle='rgba(80,50,15,0.08)'; ctx.lineWidth=0.4+Math.random()*0.8; ctx.stroke();
    }
  }),
  skin: mkTex(128,128,(ctx,w,h)=>{
    const g=ctx.createRadialGradient(50,45,5,64,64,80);
    g.addColorStop(0,'#e8b888'); g.addColorStop(0.5,'#d09060'); g.addColorStop(1,'#a86830');
    ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
  }),
};

[TEX.stone,TEX.floor,TEX.wood,TEX.gold].forEach(t=>{t.wrapS=t.wrapT=THREE.RepeatWrapping;});
TEX.stone.repeat.set(4,4); TEX.floor.repeat.set(5,5); TEX.wood.repeat.set(4,1);

// ── Materials ─────────────────────────────────────────────────────────
const M = {
  stone:    new THREE.MeshStandardMaterial({map:TEX.stone,  color:0x302618, roughness:0.96, metalness:0}),
  stoneLt:  new THREE.MeshStandardMaterial({map:TEX.stone,  color:0x50402a, roughness:0.94, metalness:0}),
  floor:    new THREE.MeshStandardMaterial({map:TEX.floor,  color:0x3a2c18, roughness:0.95, metalness:0}),
  wood:     new THREE.MeshStandardMaterial({map:TEX.wood,   color:0x4a2c12, roughness:0.88, metalness:0}),
  woodDark: new THREE.MeshStandardMaterial({map:TEX.wood,   color:0x281408, roughness:0.92, metalness:0}),
  gold:     new THREE.MeshStandardMaterial({map:TEX.gold,   color:0xe0a010, roughness:0.10, metalness:1.0, emissive:0x804800, emissiveIntensity:0.32}),
  goldDark: new THREE.MeshStandardMaterial({map:TEX.gold,   color:0x906808, roughness:0.22, metalness:0.95, emissive:0x401e00, emissiveIntensity:0.14}),
  bronze:   new THREE.MeshStandardMaterial({color:0x9a6a20, roughness:0.25, metalness:0.90, emissive:0x3a2408, emissiveIntensity:0.18}),
  silver:   new THREE.MeshStandardMaterial({color:0xc0c8c8, roughness:0.14, metalness:1.0, emissive:0x101818, emissiveIntensity:0.10}),
  red:      new THREE.MeshStandardMaterial({map:TEX.redFabric,   color:0x8a0c08, roughness:0.90, metalness:0}),
  purple:   new THREE.MeshStandardMaterial({map:TEX.purpleFabric,color:0x3a1050, roughness:0.90, metalness:0}),
  parchment:new THREE.MeshStandardMaterial({map:TEX.parchment,   color:0xd0a850, roughness:0.88, metalness:0}),
  skin:     new THREE.MeshStandardMaterial({map:TEX.skin,   color:0xc88858, roughness:0.72, metalness:0, emissive:0x180804, emissiveIntensity:0.08}),
  hair:     new THREE.MeshStandardMaterial({color:0x2a1808, roughness:0.95, metalness:0}),
  gem_ruby: new THREE.MeshStandardMaterial({color:0xcc0810, roughness:0.06, metalness:0, emissive:0xaa0408, emissiveIntensity:0.60, transparent:true, opacity:0.90}),
  gem_sap:  new THREE.MeshStandardMaterial({color:0x0830cc, roughness:0.06, metalness:0, emissive:0x0418aa, emissiveIntensity:0.55, transparent:true, opacity:0.90}),
  gem_em:   new THREE.MeshStandardMaterial({color:0x0a9030, roughness:0.07, metalness:0, emissive:0x086020, emissiveIntensity:0.50, transparent:true, opacity:0.88}),
  flame:    new THREE.MeshStandardMaterial({color:0xff5808, roughness:1, metalness:0, emissive:0xff4400, emissiveIntensity:4.5, transparent:true, opacity:0.72, side:THREE.DoubleSide}),
  ember:    new THREE.MeshStandardMaterial({color:0xff4000, roughness:1, metalness:0, emissive:0xff3800, emissiveIntensity:3.0, transparent:true, opacity:0.85}),
  candle:   new THREE.MeshStandardMaterial({color:0xf0e0b0, roughness:0.90, metalness:0, emissive:0x181008, emissiveIntensity:0.05}),
  wax:      new THREE.MeshStandardMaterial({color:0xd8c888, roughness:0.70, metalness:0, emissive:0x806020, emissiveIntensity:0.15}),
  rope:     new THREE.MeshStandardMaterial({color:0x8a7030, roughness:0.92, metalness:0}),
};

// ── Lights ────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x1a1006, 0.50));

// Window light shaft (from high window, left)
const windowLight = new THREE.SpotLight(0xfff0c8, 35, 22, Math.PI/11, 0.35, 1.6);
windowLight.position.set(-6, 9, -4);
windowLight.target.position.set(0, 0, -2);
windowLight.castShadow = true;
windowLight.shadow.mapSize.set(2048,2048);
windowLight.shadow.bias=-0.0006;
scene.add(windowLight, windowLight.target);

// Second window (right, softer)
const windowLight2 = new THREE.SpotLight(0xffe8b0, 18, 18, Math.PI/10, 0.40, 1.8);
windowLight2.position.set(7, 10, -6);
windowLight2.target.position.set(1, 0, -3);
scene.add(windowLight2, windowLight2.target);

// Torch / candelabra lights
const torchLights = [];
const torchPoses = [
  new THREE.Vector3(-3.8, 4.0, -5.5),
  new THREE.Vector3( 3.8, 4.0, -5.5),
  new THREE.Vector3(-3.8, 4.0,  1.0),
  new THREE.Vector3( 3.8, 4.0,  1.0),
];
torchPoses.forEach(pos=>{
  const l=new THREE.PointLight(0xff7820, 22, 9, 2);
  l.position.copy(pos);
  scene.add(l); torchLights.push(l);
});

// Throne accent light (warm, from below)
const throneGlow = new THREE.PointLight(0xe8c040, 14, 5, 2);
throneGlow.position.set(0, 1.5, -3.5);
scene.add(throneGlow);

// Gem glow lights
const gemLight = new THREE.PointLight(0xff2020, 4, 3, 2);
gemLight.position.set(0, 3.8, -3.5);
scene.add(gemLight);

// ── Helpers ───────────────────────────────────────────────────────────
function mk(geo,mat,{x=0,y=0,z=0,rx=0,ry=0,rz=0}={}){
  const m=new THREE.Mesh(geo,mat);
  m.position.set(x,y,z); m.rotation.set(rx,ry,rz);
  m.castShadow=true; m.receiveShadow=true;
  return m;
}
function lathe(pts,mat,segs=32,opts={}){return mk(new THREE.LatheGeometry(pts.map(([x,y])=>new THREE.Vector2(x,y)),segs),mat,opts);}
function cyl(rt,rb,h,seg,mat,opts={}){return mk(new THREE.CylinderGeometry(rt,rb,h,seg),mat,opts);}
function sph(r,seg,mat,opts={}){return mk(new THREE.SphereGeometry(r,seg,Math.ceil(seg*0.65)),mat,opts);}
function tor(R,r,ns,nt,mat,opts={}){return mk(new THREE.TorusGeometry(R,r,ns,nt),mat,opts);}
function box(w,h,d,mat,opts={}){return mk(new THREE.BoxGeometry(w,h,d),mat,opts);}
function tube(pts3,r,s,rs,mat){const m=new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts3),s,r,rs,false),mat);m.castShadow=true;return m;}

// Cabochon gem
function gem(rx,ry,rz,mat,opts={}){
  const g=new THREE.Group();
  const dome=new THREE.Mesh(new THREE.SphereGeometry(1,12,8,0,Math.PI*2,0,Math.PI/2),mat);
  dome.scale.set(rx,ry,rz); dome.castShadow=true; g.add(dome);
  g.add(mk(new THREE.CircleGeometry(rx,12),mat,{rx:Math.PI/2}));
  const{x=0,y=0,z=0}=opts; g.position.set(x,y,z);
  return g;
}

// ══════════════════════════════════════════════════════════════════════
// HALL – stone walls, wooden ceiling beams, rush-covered floor
// ══════════════════════════════════════════════════════════════════════
function buildHall(){
  const g=new THREE.Group();

  // Floor
  const fl=mk(new THREE.PlaneGeometry(18,22),M.floor,{rx:-Math.PI/2,y:0,z:-1});
  fl.receiveShadow=true; fl.castShadow=false; g.add(fl);



  // Walls
  const wallMat=M.stone;
  // back wall
  const bw=mk(new THREE.PlaneGeometry(18,10),wallMat,{y:5,z:-11});
  bw.receiveShadow=true; g.add(bw);
  // left wall
  const lw=mk(new THREE.PlaneGeometry(22,10),wallMat,{x:-9,y:5,z:-1,ry:Math.PI/2});
  lw.receiveShadow=true; g.add(lw);
  // right wall
  const rw=mk(new THREE.PlaneGeometry(22,10),wallMat,{x:9,y:5,z:-1,ry:-Math.PI/2});
  rw.receiveShadow=true; g.add(rw);
  // ceiling
  const ceilMat=new THREE.MeshStandardMaterial({map:TEX.wood,color:0x1e1008,roughness:0.96});
  const ceil=mk(new THREE.PlaneGeometry(18,22),ceilMat,{y:10,z:-1,rx:Math.PI/2});
  ceil.receiveShadow=true; g.add(ceil);

  // Stone column bases on sides
  const colPosX=[-5.5,5.5], colPosZ=[-3,-7];
  colPosX.forEach(cx=>{
    colPosZ.forEach(cz2=>{
      // column shaft
      g.add(lathe([[0,0],[0.28,0.02],[0.30,0.10],[0.26,2.20],[0.24,4.20],[0.26,4.40],[0.32,4.50],[0,4.50]],
        M.stoneLt,12,{x:cx,y:0,z:cz2}));
      // capital (wider top)
      g.add(box(0.85,0.25,0.85,M.stoneLt,{x:cx,y:4.62,z:cz2}));
    });
  });

  // Ceiling beams
  for(let i=0;i<6;i++){
    const bz=-1+i*(-2.2);
    g.add(box(18.2,0.28,0.26,M.woodDark,{y:9.62,z:bz}));
  }
  for(const bx of [-3.5,0,3.5]){
    g.add(box(0.22,0.28,22.2,M.woodDark,{x:bx,y:9.62}));
  }

  // High window openings in back wall (with light rays)
  for(const wx of [-3.5,3.5]){
    // Window recess
    g.add(box(1.60,2.20,0.60,
      new THREE.MeshStandardMaterial({color:0x1a3050,roughness:0.5,transparent:true,opacity:0.55}),
      {x:wx,y:7.0,z:-10.72}));
    // Window frame
    g.add(box(1.80,2.40,0.12,M.stoneLt,{x:wx,y:7.0,z:-10.95}));
    // Arch over window
    const archR=0.88;
    for(let ai=0;ai<10;ai++){
      const aa=(ai/9)*Math.PI;
      g.add(box(0.25,0.25,0.15,M.stoneLt,
        {x:wx+Math.cos(aa+Math.PI)*archR*0.5,y:8.12+Math.sin(aa)*archR*0.5,z:-10.95}));
    }
  }

  // Wall torches (iron brackets)
  torchPoses.forEach(pos=>{
    // bracket
    g.add(box(0.10,0.08,0.28,M.bronze,{x:pos.x,y:pos.y-0.08,z:pos.z}));
    g.add(cyl(0.04,0.04,0.45,8,M.wood,{x:pos.x,y:pos.y-0.10,z:pos.z}));
    g.add(cyl(0.09,0.07,0.18,6,
      new THREE.MeshStandardMaterial({color:0x3a2010,roughness:0.90}),
      {x:pos.x,y:pos.y+0.10,z:pos.z}));
    g.add(sph(0.06,6,M.ember,{x:pos.x,y:pos.y+0.24,z:pos.z}));
    const fl1=mk(new THREE.PlaneGeometry(0.24,0.38),M.flame,{x:pos.x,y:pos.y+0.38,z:pos.z});
    const fl2=fl1.clone(); fl2.rotation.y=Math.PI/2;
    fl1.name=fl2.name='flame';
    g.add(fl1,fl2);
  });

  // Tapestry on back wall (large hanging)
  g.add(box(4.80,3.40,0.06,M.red,{y:5.5,z:-10.90}));
  g.add(box(4.80,0.10,0.10,M.gold,{y:7.22,z:-10.90})); // top rail
  g.add(box(4.80,0.10,0.10,M.gold,{y:3.78,z:-10.90})); // bottom rail
  // Tapestry border gold
  g.add(box(0.12,3.40,0.08,M.gold,{x:-2.34,y:5.5,z:-10.88}));
  g.add(box(0.12,3.40,0.08,M.gold,{x: 2.34,y:5.5,z:-10.88}));
  // Cross motif on tapestry
  g.add(box(0.22,2.20,0.07,new THREE.MeshStandardMaterial({color:0xd8a010,roughness:0.7}),{y:5.5,z:-10.87}));
  g.add(box(1.80,0.22,0.07,new THREE.MeshStandardMaterial({color:0xd8a010,roughness:0.7}),{y:5.8,z:-10.87}));

  // Side tapestry (purple, left)
  g.add(box(0.06,3.0,3.8,M.purple,{x:-8.95,y:5.2,z:-5.0}));
  g.add(box(0.10,0.12,3.8,M.gold,{x:-8.90,y:6.72,z:-5.0}));
  g.add(box(0.10,0.12,3.8,M.gold,{x:-8.90,y:3.68,z:-5.0}));



  return g;
}

// THRONE
// ══════════════════════════════════════════════════════════════════════
function buildThrone(){
  const g=new THREE.Group();

  // Dais (raised platform, 3 steps)
  for(let s=0;s<3;s++){
    const sw=4.0-s*0.5, sd=2.2-s*0.4, sh=0.22;
    g.add(box(sw,sh,sd,M.stoneLt,{y:s*sh+sh/2,z:-(3.2+s*0.2)}));
    // Carpet on dais
    if(s===2){
      g.add(box(sw-0.12,0.025,sd-0.08,M.red,{y:s*sh+sh+0.012,z:-(3.2+s*0.2)}));
    }
  }
  const daisH=0.66;

  // Throne base
  g.add(box(1.60,0.28,1.10,M.woodDark,{y:daisH+0.14,z:-4.30}));

  // Seat
  g.add(box(1.50,0.22,0.95,M.wood,{y:daisH+0.39,z:-4.30}));
  // Red cushion on seat
  g.add(box(1.30,0.12,0.80,M.red,{y:daisH+0.52,z:-4.30}));

  // Back panel – tall carved wood
  g.add(box(1.60,2.80,0.18,M.wood,{y:daisH+1.80,z:-4.82}));
  g.add(box(1.60,2.80,0.12,M.woodDark,{y:daisH+1.80,z:-4.78}));

  // Carved arch on back panel
  for(let i=0;i<16;i++){
    const aa=(i/15)*Math.PI;
    g.add(box(0.12,0.12,0.14,M.gold,
      {x:Math.cos(aa+Math.PI)*0.60,y:daisH+3.10+Math.sin(aa)*0.52,z:-4.73,ry:aa}));
  }
  // Central panel motif – eagle/cross
  g.add(box(0.10,1.60,0.10,M.gold,{y:daisH+1.88,z:-4.72})); // vertical
  g.add(box(0.80,0.10,0.10,M.gold,{y:daisH+2.30,z:-4.72})); // horizontal

  // Throne armrests
  for(const sx of [-0.75,0.75]){
    g.add(box(0.18,0.14,0.90,M.wood,{x:sx,y:daisH+0.68,z:-4.30}));
    // Carved lion-head finials on armrests
    g.add(sph(0.12,8,M.goldDark,{x:sx,y:daisH+0.78,z:-3.85}));
    g.add(box(0.08,0.10,0.08,M.goldDark,{x:sx,y:daisH+0.70,z:-3.80}));
  }

  // Throne side posts
  for(const sx of [-0.80,0.80]){
    g.add(cyl(0.07,0.08,3.20,8,M.woodDark,{x:sx,y:daisH+2.00,z:-4.78}));
    // Post finials
    g.add(lathe([[0,0],[0.06,0.02],[0.10,0.14],[0.08,0.28],[0.04,0.32],[0,0.30]],
      M.gold,8,{x:sx,y:daisH+3.60,z:-4.78}));
  }

  // Gems decorating back panel
  const gemMats=[M.gem_ruby,M.gem_sap,M.gem_em,M.gem_ruby,M.gem_sap];
  gemMats.forEach((gm,i)=>{
    const gx=-0.80+i*0.40;
    const gemG=gem(0.065,0.055,0.065,gm);
    gemG.position.set(gx,daisH+3.05,-4.70);
    gemG.rotation.x=Math.PI/2;
    g.add(gemG);
    g.add(tor(0.08,0.018,6,12,M.gold,{x:gx,y:daisH+3.05,z:-4.68,rx:Math.PI/2}));
  });

  // Gold decorative corner pieces
  for(const sx of [-0.78,0.78]){
    for(const sy of [daisH+0.45,daisH+3.48]){
      g.add(sph(0.06,6,M.gold,{x:sx,y:sy,z:-4.80}));
    }
  }

  return g;
}

  // Small beard
  g.add(box(0.14,0.12,0.08,M.hair,{y:headY-0.16,z:-4.04,rx:-0.15}));
  // Moustache
  g.add(box(0.20,0.04,0.06,M.hair,{y:headY-0.08,z:-4.04}));
  // Eyes
  g.add(sph(0.024,5,new THREE.MeshStandardMaterial({color:0x050302}),{x:-0.08,y:headY+0.04,z:-4.03}));
  g.add(sph(0.024,5,new THREE.MeshStandardMaterial({color:0x050302}),{x: 0.08,y:headY+0.04,z:-4.03}));
  // Slight frown/dignified expression
  g.add(box(0.10,0.018,0.04,M.hair,{y:headY-0.08,z:-4.02,rx:-0.08}));

  // ── CROWN ──────────────────────────────────────────────────────────
  const crownY=headY+0.16;
  // Crown band
  g.add(tor(0.24,0.040,8,24,M.gold,{y:crownY,z:-4.24,rx:Math.PI/2}));
  // Crown points (5 trefoil points)
  for(let i=0;i<5;i++){
    const ca=i/5*Math.PI*2;
    const px=Math.cos(ca)*0.24, pz=-4.24+Math.sin(ca)*0.24;
    // point shaft
    g.add(box(0.055,0.32,0.055,M.gold,{x:px,y:crownY+0.18,z:pz}));
    // trefoil top (3 small spheres)
    g.add(sph(0.050,6,M.gold,{x:px,y:crownY+0.38,z:pz}));
    g.add(sph(0.038,5,M.gold,{x:px-0.055,y:crownY+0.36,z:pz}));
    g.add(sph(0.038,5,M.gold,{x:px+0.055,y:crownY+0.36,z:pz}));
    // gem on crown band
    const gm=gem(0.048,0.040,0.048,[M.gem_ruby,M.gem_sap,M.gem_em,M.gem_ruby,M.gem_sap][i]);
    gm.position.set(px*1.01,crownY,pz);
    gm.rotation.x=Math.PI/2;
    g.add(gm);
  }
  // Crown cross on top
  g.add(box(0.04,0.28,0.04,M.gold,{y:crownY+0.46,z:-4.24}));
  g.add(box(0.22,0.04,0.04,M.gold,{y:crownY+0.54,z:-4.24}));

  // ── SCEPTRE (right hand) ───────────────────────────────────────────
  const sceptreX=0.65, sceptreZ=-3.60;
  g.add(cyl(0.025,0.022,1.05,8,M.gold,{x:sceptreX,y:armY+0.14,z:sceptreZ,rx:0.15}));
  // Finial
  g.add(lathe([[0,0],[0.05,0.02],[0.09,0.12],[0.07,0.26],[0.03,0.30],[0,0.28]],
    M.gold,10,{x:sceptreX,y:armY+0.68,z:sceptreZ-0.02}));
  g.add(sph(0.05,8,M.gem_ruby,{x:sceptreX,y:armY+0.72,z:sceptreZ-0.02}));
  tor(0.09,0.022,6,12,M.gold,{x:sceptreX,y:armY+0.66,z:sceptreZ-0.02,rx:Math.PI/2});

  // ── ORB (left hand) ────────────────────────────────────────────────
  const orbX=-0.60, orbZ=-3.72;
  g.add(sph(0.14,12,M.gold,{x:orbX,y:armY+0.04,z:orbZ}));
  // Orb cross
  g.add(box(0.025,0.22,0.025,M.gold,{x:orbX,y:armY+0.21,z:orbZ}));
  g.add(box(0.18,0.025,0.025,M.gold,{x:orbX,y:armY+0.26,z:orbZ}));
  g.add(sph(0.038,6,M.gem_sap,{x:orbX,y:armY+0.04,z:orbZ+0.15}));
  // Orb equatorial band
  g.add(tor(0.14,0.016,6,16,M.goldDark,{x:orbX,y:armY+0.04,z:orbZ,rx:Math.PI/2}));

  // ── COLLAR / PECTORAL ──────────────────────────────────────────────
  g.add(tor(0.28,0.050,8,24,M.gold,{y:torsoY+0.40,z:-4.20,rx:Math.PI/2}));
  for(let i=0;i<10;i++){
    const ca=i/10*Math.PI*2;
    const px=Math.cos(ca)*0.28, pz2=-4.20+Math.sin(ca)*0.28;
    const gmat=[M.gem_ruby,M.gem_sap,M.gem_em][i%3];
    const cg=gem(0.040,0.034,0.040,gmat);
    cg.position.set(px,torsoY+0.40,pz2);
    cg.rotation.x=Math.PI/2;
    g.add(cg);
  }

  return g;
}

// CANDELABRA (two large, flanking throne)
// ══════════════════════════════════════════════════════════════════════
function buildCandelabra(side){
  const g=new THREE.Group();
  const sx=side*2.20, cz=-4.50;

  // Base
  g.add(lathe([[0,0],[0.30,0],[0.36,0.05],[0.28,0.18],[0.18,0.28],[0.14,0.42]],
    M.bronze,16,{x:sx,z:cz}));
  // Stem
  g.add(cyl(0.055,0.060,1.60,8,M.bronze,{x:sx,y:1.02,z:cz}));
  // Bulge
  g.add(lathe([[0,0],[0.09,0.02],[0.14,0.10],[0.10,0.20],[0.04,0.24],[0,0.22]],
    M.bronze,12,{x:sx,y:1.86,z:cz}));
  // Upper stem
  g.add(cyl(0.040,0.045,0.80,8,M.bronze,{x:sx,y:2.28,z:cz}));

  // Candle arms (5 arms)
  const arms=5, armR=0.40;
  for(let i=0;i<arms;i++){
    const ca=i/arms*Math.PI*2;
    const ax=sx+Math.cos(ca)*armR, az=cz+Math.sin(ca)*armR;
    g.add(tube([
      new THREE.Vector3(sx,2.68,cz),
      new THREE.Vector3(ax*0.6+sx*0.4,2.75,az*0.6+cz*0.4),
      new THREE.Vector3(ax,2.70,az),
    ],0.022,10,5,M.bronze));
    // Candle cup
    g.add(cyl(0.06,0.04,0.08,8,M.bronze,{x:ax,y:2.74,z:az}));
    // Candle
    g.add(cyl(0.042,0.044,0.40,8,M.candle,{x:ax,y:2.98,z:az}));
    // Wax drips
    g.add(lathe([[0,0],[0.044,0],[0.052,0.06],[0.048,0.15],[0.044,0.20]],
      M.wax,8,{x:ax,y:2.98,z:az}));
    // Flame
    const fl=mk(new THREE.PlaneGeometry(0.10,0.18),M.flame,{x:ax,y:3.30,z:az});
    const fl2=fl.clone(); fl2.rotation.y=Math.PI/2;
    fl.name=fl2.name='candleflame';
    g.add(fl,fl2);
    // Candle light
    const cl=new THREE.PointLight(0xff8020,8,3,2);
    cl.position.set(ax,3.28,az); scene.add(cl); torchLights.push(cl);
  }

  return g;
}

leftDoor.add(box(0.08,0.40,0.06,M.bronze,{x:0.06,y:3.00,z:-0.09}));
// Cross brace
leftDoor.add(box(1.85,0.08,0.06,M.woodDark,{x:0.98,y:1.80,z:-0.08}));
leftDoor.add(box(1.85,0.08,0.06,M.woodDark,{x:0.98,y:2.80,z:-0.08}));
scene.add(leftDoor);

// Right door panel (pivots on right edge: x=+1.12)
const rightDoor = new THREE.Group();
rightDoor.position.set(1.12, 0, 8.80);
const rightPanel = box(2.12, 4.10, 0.14, M.woodDark, {x:-1.06, y:2.10, z:0});
rightDoor.add(rightPanel);
for(let r=0;r<4;r++) for(let c2=0;c2<3;c2++){
  rightDoor.add(sph(0.045,5,M.bronze,{x:-0.36-c2*0.65,y:0.50+r*0.90,z:-0.09}));
}
rightDoor.add(box(0.08,0.40,0.06,M.bronze,{x:-0.06,y:1.20,z:-0.09}));
rightDoor.add(box(0.08,0.40,0.06,M.bronze,{x:-0.06,y:3.00,z:-0.09}));
rightDoor.add(box(1.85,0.08,0.06,M.woodDark,{x:-0.98,y:1.80,z:-0.08}));
rightDoor.add(box(1.85,0.08,0.06,M.woodDark,{x:-0.98,y:2.80,z:-0.08}));
scene.add(rightDoor);

scene.add(doorGroup);

// Darkness wall behind camera start (blocks view backwards)
const backdropMat = new THREE.MeshStandardMaterial({color:0x000000,roughness:1});
scene.add(box(30,20,0.5,backdropMat,{y:5,z:11.5}));

// ══════════════════════════════════════════════════════════════════════
// ENTRY ANIMATION STATE MACHINE
// ══════════════════════════════════════════════════════════════════════
// Phases:
//  0  DARKNESS   – pure black, 0.8s
//  1  OPEN_DOOR  – camera at z=10.5, doors swing open, 2.2s
//  2  WALK_IN    – camera glides from z=10.5 → z=7.5, gentle bob, 3.0s
//  3  SETTLE     – camera eases to final pos, 1.0s
//  4  IDLE       – normal look-around mode

const ENTRY = {
  phase: 0,
  elapsed: 0,
  // camera positions
  startPos: new THREE.Vector3(0, 1.65, 10.8),
  endPos:   new THREE.Vector3(0, 1.65, 7.5),
  done: false,
};
camera.position.copy(ENTRY.startPos);
camera.lookAt(0, 1.65, 8.8);

// Black overlay for fade-in
const blackOverlay = document.createElement('div');
Object.assign(blackOverlay.style,{
  position:'fixed',inset:'0',background:'#000',zIndex:'20',
  pointerEvents:'none',transition:'opacity 1.2s ease',opacity:'1',
});
document.body.appendChild(blackOverlay);

// Subtitle + title initially hidden, shown after entry
document.querySelector('#title').style.animationDelay='0s';
document.querySelector('#title').style.animationDuration='0s';
document.querySelector('#title').style.opacity='0';
document.querySelector('#subtitle').style.animationDelay='0s';
document.querySelector('#subtitle').style.opacity='0';

function easeInOut(t){ return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }
function easeOut(t)  { return 1-Math.pow(1-t,3); }
function easeIn(t)   { return t*t*t; }

// ── Camera control (active only after entry) ──────────────────────────
let pointerDown=false, lastX=0, lastY=0;
let yaw=Math.PI, pitch=-0.05;
const pitchMin=-0.50, pitchMax=0.42;

function updateCameraFree(){
  const d=new THREE.Vector3(Math.sin(yaw)*Math.cos(pitch),Math.sin(pitch),Math.cos(yaw)*Math.cos(pitch));
  camera.lookAt(camera.position.clone().add(d));
}

renderer.domElement.addEventListener('pointerdown',e=>{
  if(!ENTRY.done)return;
  pointerDown=true; lastX=e.clientX; lastY=e.clientY;
});
window.addEventListener('pointerup',()=>pointerDown=false);
window.addEventListener('pointermove',e=>{
  if(!ENTRY.done||!pointerDown)return;
  yaw  -=(e.clientX-lastX)*0.0038;
  pitch-=(e.clientY-lastY)*0.0038;
  pitch=Math.max(pitchMin,Math.min(pitchMax,pitch));
  lastX=e.clientX; lastY=e.clientY;
  updateCameraFree();
});
renderer.domElement.addEventListener('touchstart',e=>{
  if(!ENTRY.done)return;
  pointerDown=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
},{passive:true});
window.addEventListener('touchend',()=>pointerDown=false);
window.addEventListener('touchmove',e=>{
  if(!ENTRY.done||!pointerDown)return;
  yaw  -=(e.touches[0].clientX-lastX)*0.0038;
  pitch-=(e.touches[0].clientY-lastY)*0.0038;
  pitch=Math.max(pitchMin,Math.min(pitchMax,pitch));
  lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  updateCameraFree();
},{passive:true});

// ── Render loop ───────────────────────────────────────────────────────
let idleTimer=0;
const clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  const t=clock.elapsedTime;

  // ── ENTRY ANIMATION ─────────────────────────────────────────────
  if(!ENTRY.done){
    ENTRY.elapsed+=dt;
    const el=ENTRY.elapsed;

    // Phase 0: darkness (0 – 0.8s) → fade overlay out
    if(ENTRY.phase===0){
      if(el>0.5){
        blackOverlay.style.opacity='0';
      }
      if(el>0.8){ ENTRY.phase=1; ENTRY.elapsed=0; }
    }

    // Phase 1: doors swing open (0 – 2.2s)
    else if(ENTRY.phase===1){
      const phaseDur=2.2;
      const tN=Math.min(el/phaseDur,1);
      const swing=easeOut(tN)*Math.PI*0.48; // ~86° open
      leftDoor.rotation.y  = -swing;
      rightDoor.rotation.y =  swing;
      // Camera very slight drift forward (breathing)
      camera.position.z=ENTRY.startPos.z - easeInOut(tN)*0.3;
      camera.position.y=ENTRY.startPos.y + Math.sin(el*1.8)*0.008;
      camera.lookAt(0, 1.65+Math.sin(el*1.2)*0.02, 4.0);
      if(el>phaseDur){ ENTRY.phase=2; ENTRY.elapsed=0; }
    }

    // Phase 2: walk into the hall (0 – 3.2s)
    else if(ENTRY.phase===2){
      const phaseDur=3.2;
      const tN=Math.min(el/phaseDur,1);
      const ease=easeInOut(tN);
      // Walk: z from ~10.5 → 7.5
      camera.position.z=THREE.MathUtils.lerp(ENTRY.startPos.z-0.3, ENTRY.endPos.z, ease);
      // Footstep bob (vertical oscillation, quickens mid-walk)
      const steps=el*2.8;
      camera.position.y=ENTRY.startPos.y + Math.sin(steps)*0.028*(1-Math.abs(tN*2-1)*0.3);
      // Slight lateral sway
      camera.position.x=Math.sin(steps*0.5)*0.018;
      // Gaze slowly rises toward throne
      const lookZ=THREE.MathUtils.lerp(6.0, -2.0, easeOut(tN));
      const lookY=THREE.MathUtils.lerp(1.65, 1.80, easeOut(tN));
      camera.lookAt(0, lookY, lookZ);
      if(el>phaseDur){ ENTRY.phase=3; ENTRY.elapsed=0; }
    }

    // Phase 3: settle into place (0 – 1.2s)
    else if(ENTRY.phase===3){
      const phaseDur=1.2;
      const tN=Math.min(el/phaseDur,1);
      const ease=easeOut(tN);
      camera.position.set(
        THREE.MathUtils.lerp(camera.position.x, 0, ease*0.15),
        THREE.MathUtils.lerp(camera.position.y, ENTRY.endPos.y, ease*0.12),
        THREE.MathUtils.lerp(camera.position.z, ENTRY.endPos.z, ease*0.10),
      );
      camera.lookAt(0, 1.80, -2.0);
      if(el>phaseDur){
        ENTRY.done=true;
        camera.position.copy(ENTRY.endPos);
        updateCameraFree();
        // Reveal UI
        document.querySelector('#title').style.opacity='1';
        document.querySelector('#title').style.transition='opacity 2s ease';
        setTimeout(()=>{
          document.querySelector('#subtitle').style.opacity='1';
          document.querySelector('#subtitle').style.transition='opacity 2s ease';
        },1500);
      }
    }
  }

  // ── LIGHTS / FLAMES ────────────────────────────────────────────────
  torchLights.forEach((l,i)=>{
    l.intensity=l.intensity>15
      ? 22+Math.sin(t*8.1+i*1.5)*5+Math.sin(t*15.3+i*0.9)*2.5
      : 8+Math.sin(t*9.3+i*1.2)*2.5;
    l.color.setHSL(0.07+Math.sin(t*3.1+i)*0.016,1.0,0.52);
  });
  throneGlow.intensity=12+Math.sin(t*2.4)*2.5;
  gemLight.intensity=3.5+Math.sin(t*5.8)*1.5;

  scene.traverse(c=>{
    if(c.name==='flame'||c.name==='candleflame'){
      c.material.opacity=0.60+Math.sin(t*9.2+c.position.x*5)*0.22;
      const s=0.80+Math.sin(t*12.4+c.position.z*3)*0.22;
      c.scale.set(s,0.85+Math.sin(t*7.1)*0.18,s);
    }
  });

  // ── FREE LOOK + IDLE PAN (after entry) ────────────────────────────
  if(ENTRY.done){
    if(!pointerDown){ idleTimer+=dt; if(idleTimer>6) yaw+=dt*0.020; }
    else idleTimer=0;
    updateCameraFree();
  }

  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
